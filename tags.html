<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签 — Macle Chen</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- SEO -->
    <meta name="description" content="Macle Chen 博客标签汇总 — iOS 开发、逆向工程、音视频处理等技术标签">
    <meta property="og:title" content="标签 — Macle Chen">
    <meta property="og:type" content="website">
    <style>
        :root {
            --bg: #0d1117; --bg-card: #161b22; --bg-hover: #1c2128;
            --border: rgba(255,255,255,0.08); --text: #e6edf3; --text-muted: #8b949e;
            --accent: #4a9eff; --accent-bg: rgba(74,158,255,0.1); --accent-bd: rgba(74,158,255,0.25);
            --tag-bg: rgba(255,255,255,0.05); --nav-h: 54px;
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --bg-card: #fff; --bg-hover: #f3f4f6;
            --border: rgba(0,0,0,.1); --text: #24292f; --text-muted: #57606a;
            --accent: #0969da; --accent-bg: rgba(9,105,218,.08); --accent-bd: rgba(9,105,218,.2);
            --tag-bg: rgba(0,0,0,.04);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            font-size: 15px; line-height: 1.6; min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }

        /* NAV */
        .nav {
            position: sticky; top: 0; z-index: 100; height: var(--nav-h);
            background: rgba(13,17,23,0.96); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 28px; gap: 8px;
        }
        [data-theme="light"] .nav { background: rgba(246,248,250,0.96); }
        .nav-logo { font-size: 0.98rem; font-weight: 700; color: var(--text); margin-right: auto; }
        .nav-logo em { color: var(--accent); font-style: normal; }
        .nav-links { display: flex; gap: 2px; }
        .nav-links a {
            color: var(--text-muted); padding: 5px 11px;
            border-radius: 6px; font-size: 0.875rem; transition: all 0.15s;
        }
        .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav-links a.active { color: var(--text); }
        .lang-toggle {
            display: flex; overflow: hidden;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px;
        }
        .lang-toggle button {
            background: transparent; border: none; color: var(--text-muted);
            padding: 3px 10px; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .lang-toggle button.active { background: var(--accent); color: #fff; }
        .lang-toggle button:hover:not(.active) { color: var(--text); }
        .theme-btn {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
        [data-theme="light"] .theme-btn { background: rgba(0,0,0,0.04); }

        /* PAGE */
        .page-wrap { max-width: 900px; margin: 0 auto; padding: 44px 20px 80px; }
        .page-header { margin-bottom: 36px; }
        .page-header h1 { font-size: 1.6rem; font-weight: 800; margin: 0 0 6px; }
        .page-header p { font-size: 0.9rem; color: var(--text-muted); margin: 0; }

        /* TAG CLOUD */
        .tag-cloud {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 48px;
        }
        .tag-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 16px; border-radius: 20px;
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 0.85rem;
            cursor: pointer; transition: all 0.15s;
        }
        .tag-chip:hover, .tag-chip.active {
            background: var(--accent-bg); border-color: var(--accent-bd); color: var(--accent);
        }
        .tag-chip .tag-count {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 20px; height: 20px; padding: 0 5px;
            background: rgba(255,255,255,0.1); border-radius: 10px;
            font-size: 0.72rem; font-weight: 600; color: inherit;
        }
        [data-theme="light"] .tag-chip .tag-count { background: rgba(0,0,0,0.08); }
        .tag-chip.active .tag-count { background: rgba(255,255,255,0.25); }

        /* POST LIST */
        .section-head {
            display: flex; align-items: center; justify-content: space-between;
            padding-bottom: 10px; margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .section-title {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px;
            text-transform: uppercase; color: var(--text-muted); margin: 0;
        }
        .section-count { font-size: 0.82rem; color: var(--text-muted); }
        .post-list {}
        .post-row {
            display: flex; align-items: flex-start; gap: 16px;
            padding: 18px 0; border-bottom: 1px solid var(--border);
            text-decoration: none; transition: all 0.15s;
        }
        .post-row:last-child { border-bottom: none; }
        .post-row:hover .row-title { color: var(--accent); }
        .post-row-body { flex: 1; min-width: 0; }
        .row-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .row-cat {
            padding: 2px 7px; font-size: 0.7rem; font-weight: 600;
            background: var(--accent-bg); border: 1px solid var(--accent-bd);
            border-radius: 4px; color: var(--accent);
        }
        .row-date { font-size: 0.77rem; color: var(--text-muted); }
        .row-title {
            font-size: 0.97rem; font-weight: 600; color: var(--text);
            margin: 0 0 5px; line-height: 1.5; transition: color 0.15s;
        }
        .row-summary {
            font-size: 0.83rem; color: var(--text-muted); line-height: 1.6; margin: 0;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .post-row-arrow {
            color: var(--text-muted); font-size: 1rem; padding-top: 2px;
            transition: color 0.15s, transform 0.15s; flex-shrink: 0;
        }
        .post-row:hover .post-row-arrow { color: var(--accent); transform: translateX(3px); }
        .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 0.9rem; }

        footer {
            border-top: 1px solid var(--border);
            padding: 18px; text-align: center;
            font-size: 0.78rem; color: var(--text-muted);
        }
        @media (max-width: 560px) {
            .page-header h1 { font-size: 1.3rem; }
            .post-row-arrow { display: none; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">Macle<em>.</em>dev</a>
    <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="blog.html">博客</a>
        <a href="tags.html" class="active">标签</a>
        <a href="index.html#contact">联系</a>
    </div>
    <div class="lang-toggle">
        <button id="btn-zh" onclick="setLang('zh')" class="active">中</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
</nav>

<div class="page-wrap">
    <div class="page-header">
        <h1>标签云</h1>
        <p>点击标签筛选相关文章</p>
    </div>
    <div class="tag-cloud" id="tagCloud"></div>
    <div id="postSection" style="display:none">
        <div class="section-head">
            <h2 class="section-title" id="sectionTitle">文章</h2>
            <span class="section-count" id="sectionCount"></span>
        </div>
        <div class="post-list" id="postList"></div>
    </div>
</div>

<footer>
    <p>© 2026 Macle Chen &nbsp;·&nbsp; 用心分享技术</p>
</footer>

<script src="js/posts.js"></script>
<script>
    const LANG_KEY = 'macle_lang';
    let currentLang = localStorage.getItem(LANG_KEY) || 'zh';
    let activeTag = null;

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        buildTagCloud();
        if (activeTag) filterByTag(activeTag, false);
    }

    function fmtDate(str) {
        const d = new Date(str);
        return currentLang === 'en'
            ? d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
            : d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
    }

    function buildTagCloud() {
        // Count tags
        const counts = {};
        POSTS.forEach(p => {
            (p.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; });
        });
        // Sort by count desc
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        document.getElementById('tagCloud').innerHTML = sorted.map(([tag, count]) => `
            <button class="tag-chip ${activeTag === tag ? 'active' : ''}" onclick="filterByTag('${tag.replace(/'/g, "\\'")}')">
                #${tag} <span class="tag-count">${count}</span>
            </button>`).join('');
    }

    function filterByTag(tag, scroll = true) {
        if (activeTag === tag) {
            // Deselect
            activeTag = null;
            document.getElementById('postSection').style.display = 'none';
            buildTagCloud();
            return;
        }
        activeTag = tag;
        buildTagCloud();

        const filtered = POSTS.filter(p => (p.tags || []).includes(tag));
        const section = document.getElementById('postSection');
        section.style.display = 'block';
        document.getElementById('sectionTitle').textContent = '#' + tag;
        document.getElementById('sectionCount').textContent = filtered.length + ' 篇';

        if (!filtered.length) {
            document.getElementById('postList').innerHTML = '<div class="empty">没有相关文章</div>';
            return;
        }

        document.getElementById('postList').innerHTML = filtered.map(p => {
            const title = currentLang === 'en' ? (p.titleEn || p.title) : p.title;
            const summary = currentLang === 'en' ? (p.summaryEn || p.summary) : p.summary;
            const cat = currentLang === 'en' ? (p.categoryEn || p.category) : p.category;
            return `<a class="post-row" href="post.html?id=${p.id}">
                <div class="post-row-body">
                    <div class="row-meta">
                        <span class="row-cat">${cat}</span>
                        <span class="row-date">${fmtDate(p.date)}</span>
                    </div>
                    <div class="row-title">${title}</div>
                    <p class="row-summary">${summary}</p>
                </div>
                <span class="post-row-arrow">→</span>
            </a>`;
        }).join('');

        if (scroll) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ---- Theme Toggle ----
    const THEME_KEY = 'macle_theme';
    function initTheme() {
        const saved = localStorage.getItem(THEME_KEY) || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
    }
    function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem(THEME_KEY, next);
        document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
    }

    // Check URL param ?tag=xxx
    const urlTag = new URLSearchParams(location.search).get('tag');

    buildTagCloud();
    initTheme();
    if (urlTag) filterByTag(urlTag, false);
</script>
</body>
</html>
