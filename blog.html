<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - Macle Chen</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e8e8f0;
            min-height: 100vh;
        }

        /* ---- Navigation ---- */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 12, 41, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        .nav-logo {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #3498db, #8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 8px; }
        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: rgba(52,152,219,0.2);
            color: #3498db;
        }

        /* ---- Hero ---- */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
        }
        .hero h1 {
            font-size: 2.4rem;
            margin: 0 0 12px;
            background: linear-gradient(90deg, #fff, #aab8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { color: rgba(255,255,255,0.55); font-size: 1rem; margin: 0; }

        /* ---- Controls ---- */
        .controls {
            max-width: 1100px;
            margin: 0 auto 32px;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 340px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: #3498db; }
        .search-box input::placeholder { color: rgba(255,255,255,0.35); }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }
        .categories { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .cat-btn:hover { border-color: #3498db; color: #3498db; }
        .cat-btn.active {
            background: #3498db;
            border-color: #3498db;
            color: #fff;
        }

        /* ---- Posts Grid ---- */
        .posts-grid {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .post-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(52,152,219,0.35);
        }
        .card-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .card-cover-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #2c3e6e, #3d2b5e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255,255,255,0.2);
        }
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .card-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .card-category {
            padding: 3px 10px;
            background: rgba(52,152,219,0.2);
            color: #3498db;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .card-date {
            color: rgba(255,255,255,0.4);
            font-size: 0.78rem;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 10px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-summary {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 16px;
            flex: 1;
        }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .card-tag {
            padding: 2px 8px;
            background: rgba(255,255,255,0.07);
            border-radius: 8px;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.5);
        }
        .card-read {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #3498db;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: auto;
        }
        .card-read::after { content: '→'; transition: transform 0.2s; }
        .post-card:hover .card-read::after { transform: translateX(4px); }

        /* ---- Empty state ---- */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.35);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

        /* ---- Footer ---- */
        footer {
            text-align: center;
            padding: 24px;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            .posts-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">Macle Chen</a>
    <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="blog.html" class="active">博客</a>
        <a href="index.html#contact">联系我</a>
    </div>
</nav>

<div class="hero">
    <h1>技术博客</h1>
    <p>分享 iOS 开发、逆向工程、音视频处理等实战经验</p>
</div>

<div class="controls">
    <div class="search-box">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="搜索文章..." oninput="renderPosts()">
    </div>
    <div class="categories" id="categories"></div>
</div>

<div class="posts-grid" id="postsGrid"></div>

<footer>
    <p>&copy; 2025 Macle Chen. All rights reserved.</p>
</footer>

<script src="js/posts.js"></script>
<script>
    let activeCategory = 'all';

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.getFullYear() + ' 年 ' + (d.getMonth() + 1) + ' 月 ' + d.getDate() + ' 日';
    }

    function buildCategories() {
        const cats = ['all', ...new Set(POSTS.map(p => p.category))];
        const container = document.getElementById('categories');
        container.innerHTML = cats.map(c => `
            <button class="cat-btn ${c === 'all' ? 'active' : ''}"
                    onclick="setCategory('${c}')" data-cat="${c}">
                ${c === 'all' ? '全部' : c}
            </button>`).join('');
    }

    function setCategory(cat) {
        activeCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.cat === cat);
        });
        renderPosts();
    }

    function renderPosts() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        let filtered = POSTS.filter(p => {
            const matchCat = activeCategory === 'all' || p.category === activeCategory;
            const matchQ = !query ||
                p.title.toLowerCase().includes(query) ||
                p.summary.toLowerCase().includes(query) ||
                p.tags.some(t => t.toLowerCase().includes(query));
            return matchCat && matchQ;
        });

        const grid = document.getElementById('postsGrid');
        if (!filtered.length) {
            grid.innerHTML = `<div class="empty-state">
                <div class="icon">&#128196;</div>
                <p>没有找到相关文章</p>
            </div>`;
            return;
        }

        grid.innerHTML = filtered.map(p => `
            <a class="post-card" href="post.html?id=${p.id}">
                <img class="card-cover" src="${p.cover}"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
                     alt="${p.title}">
                <div class="card-cover-placeholder" style="display:none">&#128196;</div>
                <div class="card-body">
                    <div class="card-meta">
                        <span class="card-category">${p.category}</span>
                        <span class="card-date">${formatDate(p.date)}</span>
                    </div>
                    <h3 class="card-title">${p.title}</h3>
                    <p class="card-summary">${p.summary}</p>
                    <div class="card-tags">
                        ${p.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
                    </div>
                    <span class="card-read">阅读全文</span>
                </div>
            </a>`).join('');
    }

    buildCategories();
    renderPosts();
</script>
</body>
</html>
