<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>写文章 — Macle Chen</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="js/posts.js"></script>
    <style>
        :root {
            --bg:       #0d1117;
            --bg-card:  #161b22;
            --border:   rgba(255,255,255,0.08);
            --text:     #e6edf3;
            --muted:    #8b949e;
            --accent:   #4a9eff;
            --success:  #3fb950;
            --error:    #f85149;
            --warn:     #d29922;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0; height: 100%;
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); font-size: 14px;
            overflow: hidden;
        }

        /* ── NAV ── */
        .nav {
            height: 52px; display: flex; align-items: center;
            padding: 0 18px; gap: 10px;
            background: rgba(13,17,23,0.97);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .nav a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 0.95rem; margin-right: auto; }
        .nav a em { color: var(--accent); font-style: normal; }
        .nav-label { font-size: 0.82rem; color: var(--muted); }
        .word-count { font-size: 0.75rem; color: var(--muted); }

        .btn {
            padding: 6px 16px; border-radius: 7px; border: none;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s; white-space: nowrap;
        }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover:not(:disabled) { filter: brightness(1.12); }
        .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── LAYOUT ── */
        .workspace {
            display: flex; height: calc(100vh - 52px);
        }

        /* ── LEFT PANE ── */
        .left-pane {
            width: 50%; display: flex; flex-direction: column;
            border-right: 1px solid var(--border); min-width: 0;
        }

        /* meta bar */
        .meta-bar {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
        }
        .field { display: flex; flex-direction: column; gap: 3px; }
        .field label {
            font-size: 0.68rem; color: var(--muted); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
        }
        .field input, .field select {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 0.85rem;
            padding: 6px 10px; outline: none; font-family: inherit;
            transition: border-color 0.15s;
        }
        .field input:focus, .field select:focus { border-color: var(--accent); }
        .field input::placeholder { color: var(--muted); }
        .field select option { background: #1c2128; }
        .meta-row { display: flex; gap: 8px; }
        .meta-row .field { flex: 1; }

        /* toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 2px;
            padding: 6px 12px; border-bottom: 1px solid var(--border);
            flex-shrink: 0; flex-wrap: wrap;
        }
        .tb-btn {
            padding: 4px 8px; border-radius: 5px; border: none;
            background: transparent; color: var(--muted);
            font-size: 0.82rem; cursor: pointer; font-family: monospace;
            transition: all 0.12s;
        }
        .tb-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .tb-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

        /* editor */
        .md-editor {
            flex: 1; resize: none; border: none; outline: none;
            background: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
            font-size: 0.88rem; line-height: 1.75;
            padding: 18px 20px; tab-size: 4;
        }

        /* token bar */
        .token-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; border-top: 1px solid var(--border);
            background: rgba(255,255,255,0.015); flex-shrink: 0;
        }
        .token-bar span { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
        .token-bar input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            border-radius: 5px; color: var(--text); font-size: 0.78rem;
            padding: 5px 8px; outline: none; font-family: monospace;
            min-width: 0;
        }
        .token-bar input:focus { border-color: var(--accent); }
        .token-ok  { font-size: 0.72rem; color: var(--success); white-space: nowrap; }
        .token-err { font-size: 0.72rem; color: var(--error);   white-space: nowrap; }
        .token-link {
            font-size: 0.72rem; color: var(--accent); white-space: nowrap;
            text-decoration: none;
        }
        .token-link:hover { text-decoration: underline; }

        /* ── RIGHT PANE ── */
        .right-pane {
            flex: 1; overflow-y: auto; padding: 24px 36px;
            min-width: 0;
        }
        .preview-label {
            font-size: 0.68rem; color: var(--muted); text-transform: uppercase;
            letter-spacing: 1px; font-weight: 700; margin-bottom: 20px;
        }
        /* markdown preview styles */
        #preview { line-height: 1.85; font-size: 0.97rem; color: rgba(255,255,255,0.85); overflow-wrap: break-word; }
        #preview h1 { font-size: 1.7rem; color:#fff; margin:0 0 18px; }
        #preview h2 { font-size:1.3rem; color:#fff; margin:28px 0 14px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.1); }
        #preview h3 { font-size:1.08rem; color:#fff; margin:22px 0 10px; }
        #preview p  { margin:0 0 16px; }
        #preview a  { color:var(--accent); }
        #preview strong { color:#fff; }
        #preview code { background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px; font-size:0.85em; color:#e06c75; font-family:monospace; }
        #preview pre { border-radius:10px; overflow-x:auto; margin:16px 0; }
        #preview pre code { background:transparent; padding:16px; display:block; color:inherit; font-size:0.85rem; }
        #preview blockquote { border-left:4px solid var(--accent); margin:16px 0; padding:10px 16px; background:rgba(74,158,255,0.07); border-radius:0 8px 8px 0; color:var(--muted); }
        #preview ul,#preview ol { padding-left:24px; margin-bottom:16px; }
        #preview li { margin-bottom:4px; }
        #preview img { max-width:100%; border-radius:8px; margin:8px 0; }
        #preview table { width:100%; border-collapse:collapse; margin:16px 0; font-size:0.9rem; }
        #preview th { background:rgba(74,158,255,0.15); padding:8px 12px; border:1px solid rgba(255,255,255,0.1); text-align:left; }
        #preview td { padding:8px 12px; border:1px solid rgba(255,255,255,0.08); }
        #preview hr { border:none; border-top:1px solid rgba(255,255,255,0.1); margin:24px 0; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 11px 20px;
            font-size: 0.85rem; display: none; align-items: center; gap: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 999; white-space: nowrap;
        }
        .toast.show   { display: flex; }
        .toast.ok  { border-color: var(--success); color: var(--success); }
        .toast.err { border-color: var(--error);   color: var(--error);   }
        .toast.info{ border-color: var(--accent);  color: var(--accent);  }

        /* ── MODAL (draft picker) ── */
        .modal-bg {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-bg.show { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; padding: 28px; width: 380px; max-width: 90vw;
        }
        .modal h3 { margin: 0 0 16px; font-size: 1rem; }
        .modal p  { margin: 0 0 20px; font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

        @media (max-width: 800px) {
            .workspace { flex-direction: column; }
            .left-pane { width: 100%; height: 55%; border-right: none; border-bottom: 1px solid var(--border); }
            .right-pane { padding: 16px 18px; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="blog.html">Macle<em>.</em>dev</a>
    <span class="nav-label">✏️ 写文章</span>
    <span class="word-count" id="wordCount">0 字</span>
    <button class="btn btn-ghost" onclick="saveDraft()">保存草稿</button>
    <button class="btn btn-primary" id="publishBtn" onclick="publish()">发布文章</button>
</nav>

<div class="workspace">

    <!-- ── LEFT ── -->
    <div class="left-pane">
        <div class="meta-bar">
            <div class="field">
                <label>文章标题 *</label>
                <input id="fTitle" type="text" placeholder="请输入文章标题…" oninput="onInput()">
            </div>
            <div class="meta-row">
                <div class="field">
                    <label>分类</label>
                    <select id="fCategory">
                        <option value="iOS开发">iOS开发</option>
                        <option value="逆向开发">逆向开发</option>
                        <option value="Android开发">Android开发</option>
                        <option value="Python">Python</option>
                        <option value="Web开发">Web开发</option>
                        <option value="Flutter">Flutter</option>
                        <option value="Java后端">Java后端</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="field">
                    <label>标签（逗号分隔）</label>
                    <input id="fTags" type="text" placeholder="ios, swift, xcode">
                </div>
            </div>
            <div class="field">
                <label>摘要（留空则自动从正文提取）</label>
                <input id="fSummary" type="text" placeholder="一句话介绍这篇文章…">
            </div>
        </div>

        <div class="toolbar">
            <button class="tb-btn" title="标题" onclick="wrap('# ','',true)"><b>H</b></button>
            <button class="tb-btn" title="加粗" onclick="wrap('**','**')"><b>B</b></button>
            <button class="tb-btn" title="斜体" onclick="wrap('*','*')"><i>I</i></button>
            <button class="tb-btn" title="删除线" onclick="wrap('~~','~~')"><s>S</s></button>
            <div class="tb-sep"></div>
            <button class="tb-btn" title="行内代码" onclick="wrap('`','`')">`c`</button>
            <button class="tb-btn" title="代码块" onclick="wrap('```\n','\n```',true)">```</button>
            <div class="tb-sep"></div>
            <button class="tb-btn" title="链接" onclick="insertLink()">🔗</button>
            <button class="tb-btn" title="图片" onclick="insertImg()">🖼</button>
            <div class="tb-sep"></div>
            <button class="tb-btn" title="无序列表" onclick="wrap('- ','',true)">•─</button>
            <button class="tb-btn" title="有序列表" onclick="wrap('1. ','',true)">1.</button>
            <button class="tb-btn" title="引用" onclick="wrap('> ','',true)">"</button>
            <button class="tb-btn" title="分割线" onclick="insertHr()">─</button>
        </div>

        <textarea class="md-editor" id="mdEditor"
            placeholder="# 文章标题&#10;&#10;开始写作…支持完整 Markdown 语法"
            oninput="onInput()"
            onkeydown="handleKey(event)"></textarea>

        <div class="token-bar">
            <span>GitHub Token</span>
            <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxx…" oninput="saveToken()">
            <span id="tokenStatus" class="token-err">未设置</span>
            <a class="token-link"
               href="https://github.com/settings/tokens/new?scopes=repo&description=Macle+Blog+Editor"
               target="_blank">获取 Token →</a>
        </div>
    </div>

    <!-- ── RIGHT ── -->
    <div class="right-pane">
        <div class="preview-label">实时预览</div>
        <div id="preview"><span style="color:#8b949e;font-size:0.9rem">开始写作，右侧实时预览…</span></div>
    </div>
</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<!-- draft modal -->
<div class="modal-bg" id="draftModal">
    <div class="modal">
        <h3>📝 检测到未保存草稿</h3>
        <p>上次编辑的内容尚未发布，是否恢复？</p>
        <div class="modal-btns">
            <button class="btn btn-ghost" onclick="discardDraft()">丢弃</button>
            <button class="btn btn-primary" onclick="restoreDraft()">恢复草稿</button>
        </div>
    </div>
</div>

<script>
const REPO      = 'MacleChen/MacleChen.github.io';
const DRAFT_KEY = 'macle_draft';
const TOKEN_KEY = 'macle_token';

// Edit mode state
const urlParams  = new URLSearchParams(location.search);
const editId     = urlParams.get('id');
const isEditMode = !!editId;
let   editPost   = null;

// ── Utils ─────────────────────────────────────────────────────────
function strToB64(str) {
    const bytes = new TextEncoder().encode(str);
    let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin);
}
function b64ToStr(b64) {
    const bin = atob(b64.replace(/\n/g, ''));
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
}
function jsStr(s) {
    return s.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$\{/g, '\\${');
}
function buildEntry(post) {
    return `  {\n    id: ${JSON.stringify(post.id)},\n    title: \`${jsStr(post.title)}\`,\n    date: ${JSON.stringify(post.date)},\n    category: ${JSON.stringify(post.category)},\n    tags: ${JSON.stringify(post.tags)},\n    summary: \`${jsStr(post.summary)}\`,\n    cover: "",\n    csdn_url: ${JSON.stringify(post.csdn_url || '')},\n  },`;
}
// Replace an existing entry in posts.js by id (line-based, handles template literals safely)
function replaceEntryInJs(content, id, newEntry) {
    const lines   = content.split('\n');
    const target  = `    id: ${JSON.stringify(id)},`;
    const idLine  = lines.findIndex(l => l === target);
    if (idLine === -1) throw new Error(`posts.js 中找不到 id=${id}`);
    const startLine = idLine - 1; // '  {'
    let endLine = idLine + 1;
    while (endLine < lines.length && lines[endLine].trimEnd() !== '  },') endLine++;
    lines.splice(startLine, endLine - startLine + 1, ...newEntry.split('\n'));
    return lines.join('\n');
}

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
    const tok = localStorage.getItem(TOKEN_KEY) || '';
    document.getElementById('tokenInput').value = tok;
    updateTokenStatus(tok);

    if (isEditMode) {
        // Switch UI to edit mode
        document.title = '编辑文章 — Macle Chen';
        document.querySelector('.nav-label').textContent = '✏️ 编辑文章';
        document.getElementById('publishBtn').textContent = '保存修改';
        document.getElementById('draftModal').remove(); // no draft restore in edit mode

        // Load metadata from POSTS array
        editPost = (typeof POSTS !== 'undefined') ? POSTS.find(p => p.id === editId) : null;
        if (editPost) {
            document.getElementById('fTitle').value    = editPost.title;
            document.getElementById('fCategory').value = editPost.category;
            document.getElementById('fTags').value     = (editPost.tags || []).join(', ');
            document.getElementById('fSummary').value  = editPost.summary || '';
        }

        // Load markdown content
        showToast('正在加载文章内容…', 'info');
        try {
            const r = await fetch(`./posts/${editId}.md?_=${Date.now()}`);
            if (r.ok) {
                document.getElementById('mdEditor').value = await r.text();
                showToast('文章加载完成', 'ok', 2000);
            } else {
                showToast('Markdown 文件加载失败，可重新编写', 'err');
            }
        } catch { showToast('网络错误，无法加载文章', 'err'); }
        updatePreview(); updateWordCount();
        return;
    }

    // New post mode: check draft
    const draft = localStorage.getItem(DRAFT_KEY);
    if (draft) {
        try {
            const d = JSON.parse(draft);
            if (d.title || d.content) {
                document.getElementById('draftModal').classList.add('show');
                return;
            }
        } catch {}
    }
    updatePreview();
});

function restoreDraft() {
    closeDraftModal();
    const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
    if (d.title)    document.getElementById('fTitle').value    = d.title;
    if (d.category) document.getElementById('fCategory').value = d.category;
    if (d.tags)     document.getElementById('fTags').value     = d.tags;
    if (d.summary)  document.getElementById('fSummary').value  = d.summary;
    if (d.content)  document.getElementById('mdEditor').value  = d.content;
    updatePreview();
}
function discardDraft() { localStorage.removeItem(DRAFT_KEY); closeDraftModal(); }
function closeDraftModal() { document.getElementById('draftModal').classList.remove('show'); }

// ── Preview ───────────────────────────────────────────────────────
marked.setOptions({
    highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
        return hljs.highlightAuto(code).value;
    },
    breaks: true, gfm: true
});
let previewTimer;
function onInput() {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(updatePreview, 120);
    updateWordCount();
}
function updatePreview() {
    const md = document.getElementById('mdEditor').value;
    document.getElementById('preview').innerHTML = md
        ? marked.parse(md)
        : '<span style="color:#8b949e;font-size:0.9rem">开始写作，右侧实时预览…</span>';
}
function updateWordCount() {
    const count = document.getElementById('mdEditor').value.replace(/\s/g, '').length;
    document.getElementById('wordCount').textContent = count + ' 字';
}

// ── Toolbar ───────────────────────────────────────────────────────
function getEditor() { return document.getElementById('mdEditor'); }
function wrap(before, after, lineMode = false) {
    const el = getEditor();
    let s = el.selectionStart, e = el.selectionEnd;
    let sel = el.value.substring(s, e);
    if (lineMode && !sel) {
        const lines = el.value.substring(0, s).split('\n');
        const ls = s - lines[lines.length - 1].length;
        el.setSelectionRange(ls, ls); s = e = ls;
    }
    el.setRangeText(before + sel + after, s, e, 'select');
    if (!sel) el.setSelectionRange(s + before.length, s + before.length);
    el.focus(); onInput();
}
function insertLink() {
    const el = getEditor(), s = el.selectionStart, e = el.selectionEnd;
    el.setRangeText(`[${el.value.substring(s, e) || '链接文字'}](https://)`, s, e, 'select');
    el.focus(); onInput();
}
function insertImg() {
    const el = getEditor(), s = el.selectionStart, e = el.selectionEnd;
    el.setRangeText('![图片描述](https://图片地址)', s, e, 'end');
    el.focus(); onInput();
}
function insertHr() {
    const el = getEditor(), s = el.selectionStart;
    el.setRangeText('\n\n---\n\n', s, s, 'end');
    el.focus(); onInput();
}
function handleKey(e) {
    if (e.key === 'Tab') {
        e.preventDefault();
        const el = e.target, s = el.selectionStart, en = el.selectionEnd;
        el.value = el.value.substring(0, s) + '    ' + el.value.substring(en);
        el.selectionStart = el.selectionEnd = s + 4; onInput();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveDraft(); }
}

// ── Token ─────────────────────────────────────────────────────────
function saveToken() {
    const t = document.getElementById('tokenInput').value.trim();
    localStorage.setItem(TOKEN_KEY, t); updateTokenStatus(t);
}
function updateTokenStatus(t) {
    const el = document.getElementById('tokenStatus');
    if (!t) { el.textContent = '未设置'; el.className = 'token-err'; return; }
    const ok = t.startsWith('ghp_') || t.startsWith('github_pat_');
    el.textContent = ok ? '✓ 已设置' : '⚠ 格式可能有误';
    el.className = ok ? 'token-ok' : 'token-err';
}

// ── Draft ─────────────────────────────────────────────────────────
function saveDraft() {
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
        title: document.getElementById('fTitle').value,
        category: document.getElementById('fCategory').value,
        tags: document.getElementById('fTags').value,
        summary: document.getElementById('fSummary').value,
        content: document.getElementById('mdEditor').value,
    }));
    showToast('草稿已保存 (Cmd/Ctrl+S)', 'info');
}

// ── GitHub API ────────────────────────────────────────────────────
async function ghFetch(token, path, method = 'GET', body = null) {
    const opts = {
        method,
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, opts);
    const data = await r.json();
    if (!r.ok) throw new Error(data.message || `HTTP ${r.status}`);
    return data;
}
async function putFile(token, path, content, message, sha) {
    const body = { message, content: strToB64(content) };
    if (sha) body.sha = sha;
    return ghFetch(token, path, 'PUT', body);
}
async function getFileSha(token, path) {
    try { return (await ghFetch(token, path)).sha; } catch { return null; }
}

// ── Publish (new post) ────────────────────────────────────────────
async function publish() {
    if (isEditMode) return saveEdits();

    const token = (localStorage.getItem(TOKEN_KEY) || '').trim();
    if (!token) { showToast('请先在底部设置 GitHub Token', 'err'); return; }

    const title = document.getElementById('fTitle').value.trim();
    const content = document.getElementById('mdEditor').value.trim();
    if (!title)   { showToast('请填写文章标题', 'err'); return; }
    if (!content) { showToast('文章内容不能为空', 'err'); return; }

    const category = document.getElementById('fCategory').value;
    const tags     = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean);
    const summary  = document.getElementById('fSummary').value.trim()
        || content.replace(/```[\s\S]*?```/g, '').replace(/[#*`>!\[\]]/g, '').replace(/\s+/g, ' ').trim().slice(0, 200);
    const postId   = Date.now().toString();
    const date     = new Date().toISOString().slice(0, 10);

    const btn = document.getElementById('publishBtn');
    btn.disabled = true; btn.textContent = '发布中…';
    try {
        showToast('正在创建文章文件…', 'info');
        await putFile(token, `posts/${postId}.md`, content, `新增文章：${title}`, null);

        showToast('正在更新文章列表…', 'info');
        const jsData = await ghFetch(token, 'js/posts.js');
        const current = b64ToStr(jsData.content);
        const marker = 'const POSTS = [';
        const idx = current.indexOf(marker);
        if (idx === -1) throw new Error('posts.js 格式异常');
        const entry = buildEntry({ id: postId, title, date, category, tags, summary, csdn_url: '' });
        const updated = current.slice(0, idx + marker.length) + '\n' + entry + current.slice(idx + marker.length);
        await putFile(token, 'js/posts.js', updated, `新增博文：${title}`, jsData.sha);

        localStorage.removeItem(DRAFT_KEY);
        showToast('✓ 发布成功！约 1~2 分钟后生效', 'ok', 6000);
        setTimeout(() => {
            if (confirm(`"${title}" 发布成功！\n\n是否前往文章页面查看？`))
                location.href = `post.html?id=${postId}`;
        }, 600);
    } catch (e) {
        showToast('发布失败：' + e.message, 'err', 6000);
    } finally {
        btn.disabled = false; btn.textContent = '发布文章';
    }
}

// ── Save edits (edit mode) ────────────────────────────────────────
async function saveEdits() {
    const token = (localStorage.getItem(TOKEN_KEY) || '').trim();
    if (!token) { showToast('请先在底部设置 GitHub Token', 'err'); return; }

    const title   = document.getElementById('fTitle').value.trim();
    const content = document.getElementById('mdEditor').value.trim();
    if (!title)   { showToast('请填写文章标题', 'err'); return; }
    if (!content) { showToast('文章内容不能为空', 'err'); return; }

    const category = document.getElementById('fCategory').value;
    const tags     = document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean);
    const summary  = document.getElementById('fSummary').value.trim()
        || content.replace(/```[\s\S]*?```/g, '').replace(/[#*`>!\[\]]/g, '').replace(/\s+/g, ' ').trim().slice(0, 200);
    const date     = editPost ? editPost.date : new Date().toISOString().slice(0, 10);
    const csdnUrl  = editPost ? (editPost.csdn_url || '') : '';

    const btn = document.getElementById('publishBtn');
    btn.disabled = true; btn.textContent = '保存中…';
    try {
        showToast('正在更新文章内容…', 'info');
        const mdSha = await getFileSha(token, `posts/${editId}.md`);
        await putFile(token, `posts/${editId}.md`, content, `更新文章：${title}`, mdSha);

        showToast('正在更新文章元数据…', 'info');
        const jsData = await ghFetch(token, 'js/posts.js');
        const current = b64ToStr(jsData.content);
        const newEntry = buildEntry({ id: editId, title, date, category, tags, summary, csdn_url: csdnUrl });
        const updated = replaceEntryInJs(current, editId, newEntry);
        await putFile(token, 'js/posts.js', updated, `更新博文：${title}`, jsData.sha);

        showToast('✓ 保存成功！约 1~2 分钟后生效', 'ok', 6000);
        setTimeout(() => {
            if (confirm(`"${title}" 保存成功！\n\n是否前往文章页面查看？`))
                location.href = `post.html?id=${editId}`;
        }, 600);
    } catch (e) {
        showToast('保存失败：' + e.message, 'err', 6000);
    } finally {
        btn.disabled = false; btn.textContent = '保存修改';
    }
}

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'ok', duration = 3500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', duration);
}
</script>
