<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>文章管理 — Macle Chen</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="js/posts.js"></script>
    <style>
        :root {
            --bg:      #0d1117;
            --card:    #161b22;
            --border:  rgba(255,255,255,0.08);
            --text:    #e6edf3;
            --muted:   #8b949e;
            --accent:  #4a9eff;
            --success: #3fb950;
            --error:   #f85149;
            --warn:    #d29922;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 14px; min-height: 100vh;
        }

        /* NAV */
        .nav {
            position: sticky; top: 0; z-index: 100;
            height: 52px; display: flex; align-items: center;
            padding: 0 20px; gap: 10px;
            background: rgba(13,17,23,0.97);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-weight: 700; font-size: 0.95rem; color: var(--text); text-decoration: none; margin-right: auto; }
        .nav-logo em { color: var(--accent); font-style: normal; }
        .btn {
            padding: 6px 16px; border-radius: 7px; border: none;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s; white-space: nowrap;
            text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { filter: brightness(1.12); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger { background: transparent; border: 1px solid rgba(248,81,73,0.35); color: var(--error); }
        .btn-danger:hover { background: rgba(248,81,73,0.12); border-color: var(--error); }
        .btn-sm { padding: 4px 10px; font-size: 0.75rem; border-radius: 5px; }

        /* WRAP */
        .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 20px 80px; }

        /* CONTROLS */
        .controls {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
        .search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }
        .search-wrap input {
            width: 100%; padding: 7px 12px 7px 32px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 7px; color: var(--text); font-size: 0.85rem;
            outline: none; font-family: inherit; transition: border-color 0.15s;
        }
        .search-wrap input:focus { border-color: var(--accent); }
        .search-wrap input::placeholder { color: var(--muted); }
        .cat-select {
            padding: 7px 10px; background: var(--card); border: 1px solid var(--border);
            border-radius: 7px; color: var(--text); font-size: 0.82rem;
            outline: none; font-family: inherit; cursor: pointer;
        }
        .stats { font-size: 0.8rem; color: var(--muted); margin-left: auto; }

        /* TOKEN BAR */
        .token-bar {
            display: flex; align-items: center; gap: 8px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 9px; padding: 10px 14px; margin-bottom: 20px;
        }
        .token-bar span { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
        .token-bar input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            border-radius: 5px; color: var(--text); font-size: 0.78rem;
            padding: 5px 8px; outline: none; font-family: monospace; min-width: 0;
        }
        .token-bar input:focus { border-color: var(--accent); }
        .tok-ok  { font-size: 0.75rem; color: var(--success); white-space: nowrap; }
        .tok-err { font-size: 0.75rem; color: var(--error);   white-space: nowrap; }
        .tok-link { font-size: 0.75rem; color: var(--accent); text-decoration: none; white-space: nowrap; }
        .tok-link:hover { text-decoration: underline; }

        /* TABLE */
        .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            background: var(--card); padding: 10px 14px;
            text-align: left; font-size: 0.75rem; font-weight: 700;
            color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border); white-space: nowrap;
        }
        tbody tr { transition: background 0.12s; }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody tr + tr { border-top: 1px solid var(--border); }
        td { padding: 11px 14px; vertical-align: middle; }
        .td-num { color: var(--muted); font-size: 0.78rem; width: 44px; }
        .td-title { max-width: 340px; }
        .td-title a {
            color: var(--text); text-decoration: none; font-size: 0.88rem;
            font-weight: 500; line-height: 1.4; display: block;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        .td-title a:hover { color: var(--accent); }
        .td-cat span {
            padding: 2px 8px; font-size: 0.68rem; font-weight: 600;
            background: rgba(74,158,255,0.1); border: 1px solid rgba(74,158,255,0.25);
            border-radius: 4px; color: var(--accent); white-space: nowrap;
        }
        .td-date { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
        .td-actions { white-space: nowrap; }
        .td-actions { display: flex; gap: 6px; align-items: center; }

        /* PAGINATION */
        .pagination {
            display: flex; align-items: center; justify-content: center;
            gap: 4px; margin-top: 28px; flex-wrap: wrap;
        }
        .pg { min-width: 32px; height: 32px; padding: 0 8px; border-radius: 6px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 0.82rem; cursor: pointer;
            font-family: inherit; display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.12s;
        }
        .pg:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .pg.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
        .pg:disabled { opacity: 0.3; cursor: not-allowed; }
        .pg-info { font-size: 0.75rem; color: var(--muted); margin-left: 8px; }

        /* EMPTY */
        .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; }

        /* DELETE MODAL */
        .modal-bg {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.65); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-bg.show { display: flex; }
        .modal {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 28px 28px 24px; width: 380px; max-width: 92vw;
        }
        .modal h3 { margin: 0 0 10px; font-size: 1rem; color: var(--error); }
        .modal p  { margin: 0 0 20px; font-size: 0.85rem; color: var(--muted); line-height: 1.65; }
        .modal p strong { color: var(--text); }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 20px; font-size: 0.85rem;
            display: none; align-items: center; gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 999; white-space: nowrap;
        }
        .toast.show   { display: flex; }
        .toast.ok  { border-color: var(--success); color: var(--success); }
        .toast.err { border-color: var(--error);   color: var(--error); }
        .toast.info{ border-color: var(--accent);  color: var(--accent); }

        @media (max-width: 600px) {
            .td-cat, .td-date { display: none; }
            .td-title { max-width: 200px; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="blog.html" class="nav-logo">Macle<em>.</em>dev</a>
    <a href="editor.html" class="btn btn-primary">+ 写文章</a>
</nav>

<div class="wrap">
    <!-- Token -->
    <div class="token-bar">
        <span>GitHub Token</span>
        <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxx…" oninput="saveToken()">
        <span id="tokenStatus" class="tok-err">未设置</span>
        <a class="tok-link"
           href="https://github.com/settings/tokens/new?scopes=repo&description=Macle+Blog+Editor"
           target="_blank">获取 →</a>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="search-wrap">
            <span class="search-ico">⌕</span>
            <input id="searchInput" type="text" placeholder="搜索文章标题…" oninput="currentPage=1;render()">
        </div>
        <select id="catSelect" class="cat-select" onchange="currentPage=1;render()">
            <option value="">全部分类</option>
        </select>
        <span class="stats" id="stats"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th class="td-num">#</th>
                    <th>标题</th>
                    <th class="td-cat">分类</th>
                    <th class="td-date">日期</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="emptyHint" class="empty" style="display:none">没有找到相关文章</div>
    <div class="pagination" id="pagination"></div>
</div>

<!-- Delete confirmation modal -->
<div class="modal-bg" id="deleteModal">
    <div class="modal">
        <h3>⚠ 确认删除</h3>
        <p>即将删除文章：<strong id="deleteTitle"></strong><br>此操作不可撤销，文章将从列表和仓库中永久移除。</p>
        <div class="modal-btns">
            <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
            <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">确认删除</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REPO      = 'MacleChen/MacleChen.github.io';
const TOKEN_KEY = 'macle_token';
const PAGE_SIZE = 25;

let currentPage  = 1;
let deleteTarget = null; // { id, title }

// ── Init ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    const tok = localStorage.getItem(TOKEN_KEY) || '';
    document.getElementById('tokenInput').value = tok;
    updateTokenStatus(tok);

    // Build category dropdown
    const cats = [...new Set((typeof POSTS !== 'undefined' ? POSTS : []).map(p => p.category))].sort();
    const sel = document.getElementById('catSelect');
    cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });

    render();
});

// ── Render ────────────────────────────────────────────────────────
function render() {
    const q   = document.getElementById('searchInput').value.toLowerCase().trim();
    const cat = document.getElementById('catSelect').value;
    const all = typeof POSTS !== 'undefined' ? POSTS : [];

    const filtered = all.filter(p => {
        const matchCat = !cat || p.category === cat;
        const matchQ   = !q || p.title.toLowerCase().includes(q) || (p.summary || '').toLowerCase().includes(q);
        return matchCat && matchQ;
    });

    const total      = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    document.getElementById('stats').textContent = `共 ${total} 篇`;

    const tbody     = document.getElementById('tbody');
    const emptyHint = document.getElementById('emptyHint');

    if (!total) {
        tbody.innerHTML = '';
        emptyHint.style.display = 'block';
        document.getElementById('pagination').innerHTML = '';
        return;
    }
    emptyHint.style.display = 'none';

    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);

    tbody.innerHTML = page.map((p, i) => `
        <tr>
            <td class="td-num">${start + i + 1}</td>
            <td class="td-title">
                <a href="post.html?id=${p.id}" target="_blank" title="${escHtml(p.title)}">${escHtml(p.title)}</a>
            </td>
            <td class="td-cat"><span>${escHtml(p.category)}</span></td>
            <td class="td-date">${p.date}</td>
            <td>
                <div class="td-actions">
                    <a href="editor.html?id=${p.id}" class="btn btn-ghost btn-sm">✏ 编辑</a>
                    <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${p.id}', ${JSON.stringify(escHtml(p.title))})">🗑 删除</button>
                </div>
            </td>
        </tr>`).join('');

    renderPagination(totalPages);
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Pagination ────────────────────────────────────────────────────
function renderPagination(totalPages) {
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    const pages = [];
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2))
            pages.push(i);
        else if (pages[pages.length - 1] !== '…') pages.push('…');
    }
    document.getElementById('pagination').innerHTML =
        `<button class="pg" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>` +
        pages.map(p => p === '…'
            ? `<span style="color:var(--muted);padding:0 4px">…</span>`
            : `<button class="pg ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`
        ).join('') +
        `<button class="pg" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>` +
        `<span class="pg-info">第 ${currentPage} / ${totalPages} 页</span>`;
}
function goPage(p) { currentPage = p; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

// ── Token ─────────────────────────────────────────────────────────
function saveToken() {
    const t = document.getElementById('tokenInput').value.trim();
    localStorage.setItem(TOKEN_KEY, t); updateTokenStatus(t);
}
function updateTokenStatus(t) {
    const el = document.getElementById('tokenStatus');
    if (!t) { el.textContent = '未设置（删除操作需要）'; el.className = 'tok-err'; return; }
    const ok = t.startsWith('ghp_') || t.startsWith('github_pat_');
    el.textContent = ok ? '✓ 已设置' : '⚠ 格式可能有误';
    el.className = ok ? 'tok-ok' : 'tok-err';
}

// ── Delete ────────────────────────────────────────────────────────
function openDeleteModal(id, title) {
    deleteTarget = { id, title };
    document.getElementById('deleteTitle').textContent = title;
    document.getElementById('deleteModal').classList.add('show');
}
function closeDeleteModal() {
    deleteTarget = null;
    document.getElementById('deleteModal').classList.remove('show');
}

async function confirmDelete() {
    const token = (localStorage.getItem(TOKEN_KEY) || '').trim();
    if (!token) { showToast('请先设置 GitHub Token', 'err'); closeDeleteModal(); return; }
    if (!deleteTarget) return;

    const { id, title } = deleteTarget;
    const btn = document.getElementById('confirmDeleteBtn');
    btn.disabled = true; btn.textContent = '删除中…';

    try {
        // 1. Delete posts/{id}.md
        showToast('正在删除文章文件…', 'info');
        const mdData = await ghFetch(token, `posts/${id}.md`);
        await ghFetch(token, `posts/${id}.md`, 'DELETE', {
            message: `删除文章：${title}`,
            sha: mdData.sha,
        });

        // 2. Remove entry from posts.js
        showToast('正在更新文章列表…', 'info');
        const jsData = await ghFetch(token, 'js/posts.js');
        const current = b64ToStr(jsData.content);
        const updated = removeEntryFromJs(current, id);
        await ghFetch(token, 'js/posts.js', 'PUT', {
            message: `删除博文：${title}`,
            content: strToB64(updated),
            sha: jsData.sha,
        });

        closeDeleteModal();
        showToast(`✓ "${title}" 已删除，约 1 分钟后生效`, 'ok', 5000);

        // Remove from local POSTS array for immediate UI update
        if (typeof POSTS !== 'undefined') {
            const idx = POSTS.findIndex(p => p.id === id);
            if (idx !== -1) POSTS.splice(idx, 1);
        }
        render();
    } catch (e) {
        showToast('删除失败：' + e.message, 'err', 6000);
    } finally {
        btn.disabled = false; btn.textContent = '确认删除';
    }
}

// ── GitHub API ────────────────────────────────────────────────────
async function ghFetch(token, path, method = 'GET', body = null) {
    const opts = {
        method,
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, opts);
    if (method === 'DELETE' && r.status === 200) return {};
    const data = await r.json();
    if (!r.ok) throw new Error(data.message || `HTTP ${r.status}`);
    return data;
}

// ── posts.js manipulation ─────────────────────────────────────────
function strToB64(str) {
    const bytes = new TextEncoder().encode(str);
    let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin);
}
function b64ToStr(b64) {
    const bin = atob(b64.replace(/\n/g, ''));
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
}
function removeEntryFromJs(content, id) {
    const lines  = content.split('\n');
    const target = `    id: ${JSON.stringify(id)},`;
    const idLine = lines.findIndex(l => l === target);
    if (idLine === -1) throw new Error(`posts.js 中找不到 id=${id}`);
    const startLine = idLine - 1; // '  {'
    let endLine = idLine + 1;
    while (endLine < lines.length && lines[endLine].trimEnd() !== '  },') endLine++;
    lines.splice(startLine, endLine - startLine + 1);
    return lines.join('\n');
}

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'ok', duration = 3500) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', duration);
}
</script>
</body>
</html>
