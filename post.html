<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - Macle Chen</title>

    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0; padding: 0;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        /* ---- Navigation ---- */
        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13,17,23,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 28px;
            display: flex; align-items: center; gap: 8px;
            height: 54px;
        }
        .nav-logo {
            font-size: 0.98rem; font-weight: 700;
            color: #e6edf3; text-decoration: none; margin-right: auto;
        }
        .nav-logo em { color: #4a9eff; font-style: normal; }
        .nav-links { display: flex; gap: 2px; }
        .nav-links a {
            color: #8b949e; text-decoration: none;
            padding: 5px 11px; border-radius: 6px;
            font-size: 0.875rem; transition: all 0.15s;
        }
        .nav-links a:hover { color: #e6edf3; background: rgba(255,255,255,0.05); }
        .lang-toggle {
            display: flex; overflow: hidden;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
        }
        .lang-toggle button {
            background: transparent; border: none;
            color: #8b949e; padding: 3px 10px;
            font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
            font-family: inherit;
        }
        .lang-toggle button.active { background: #4a9eff; color: #fff; }
        .lang-toggle button:hover:not(.active) { color: #e6edf3; }

        /* ---- Layout ---- */
        .page-layout {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 20px 100px;
            display: grid;
            grid-template-columns: 1fr 260px;
            gap: 40px;
            align-items: start;
        }

        /* ---- Post Article ---- */
        .post-article {
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
        }
        .post-cover {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }
        .post-header {
            padding: 32px 40px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .post-meta-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .post-category {
            padding: 4px 12px;
            background: rgba(52,152,219,0.2);
            color: #3498db;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .post-date {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }
        .post-title {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1.4;
            color: #fff;
            margin: 0 0 16px;
        }
        .post-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .post-tag {
            padding: 3px 10px;
            background: rgba(255,255,255,0.07);
            border-radius: 10px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
        }

        /* ---- Markdown Content ---- */
        .post-content {
            padding: 32px 40px 40px;
            line-height: 1.85;
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
        }
        .post-content h1, .post-content h2, .post-content h3 {
            color: #fff;
            line-height: 1.4;
        }
        .post-content h1 { font-size: 1.75rem; margin: 40px 0 20px; }
        .post-content h2 {
            font-size: 1.35rem;
            margin: 36px 0 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .post-content h3 { font-size: 1.1rem; margin: 28px 0 12px; }
        .post-content p { margin: 0 0 20px; }
        .post-content a { color: #3498db; text-decoration: none; }
        .post-content a:hover { text-decoration: underline; }
        .post-content strong { color: #fff; }
        .post-content code {
            background: rgba(255,255,255,0.1);
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 0.88em;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            color: #e06c75;
        }
        .post-content pre {
            border-radius: 12px;
            overflow-x: auto;
            margin: 20px 0;
            padding: 0;
        }
        .post-content pre code {
            background: transparent;
            padding: 20px;
            border-radius: 12px;
            display: block;
            font-size: 0.88rem;
            line-height: 1.7;
            color: inherit;
        }
        .post-content blockquote {
            border-left: 4px solid #3498db;
            margin: 20px 0;
            padding: 12px 20px;
            background: rgba(52,152,219,0.08);
            border-radius: 0 8px 8px 0;
            color: rgba(255,255,255,0.7);
        }
        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        .post-content th {
            background: rgba(52,152,219,0.2);
            padding: 10px 14px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            color: #3498db;
        }
        .post-content td {
            padding: 9px 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .post-content tr:nth-child(even) td {
            background: rgba(255,255,255,0.03);
        }
        .post-content ul, .post-content ol {
            padding-left: 24px;
            margin-bottom: 20px;
        }
        .post-content li { margin-bottom: 6px; }
        .post-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 16px 0;
        }
        .post-content hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 32px 0;
        }

        /* ---- Post Footer ---- */
        .post-footer {
            padding: 24px 40px;
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .share-btns { display: flex; gap: 10px; }
        .share-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .share-btn:hover {
            background: rgba(52,152,219,0.2);
            border-color: #3498db;
            color: #3498db;
        }
        .donate-btn-inline {
            padding: 10px 24px;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        .donate-btn-inline:hover { opacity: 0.85; transform: scale(1.04); }

        /* ---- Comments ---- */
        .comments-section {
            padding: 32px 40px 40px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .comments-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 24px;
        }
        .giscus-notice { display: none; }

        /* ---- Sidebar ---- */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-card {
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
        }
        .sidebar-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 16px;
        }
        .toc-list { list-style: none; padding: 0; margin: 0; }
        .toc-list li { margin-bottom: 8px; }
        .toc-list a {
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
            display: block;
            padding: 2px 0;
        }
        .toc-list a:hover { color: #3498db; }
        .toc-h3 { padding-left: 14px !important; font-size: 0.82rem !important; }

        .related-post {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            text-decoration: none;
        }
        .related-post:last-child { border-bottom: none; padding-bottom: 0; }
        .related-post-title {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.4;
            transition: color 0.2s;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .related-post:hover .related-post-title { color: #3498db; }
        .related-post-date { font-size: 0.75rem; color: rgba(255,255,255,0.3); }

        /* ---- Floating Donate Button ---- */
        .fab-donate {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 50;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            border: none;
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(231,76,60,0.45);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fab-donate:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 28px rgba(231,76,60,0.6);
        }
        .fab-donate-label {
            position: fixed;
            bottom: 38px;
            right: 96px;
            background: rgba(15,12,41,0.9);
            color: rgba(255,255,255,0.85);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .fab-donate:hover + .fab-donate-label { opacity: 1; }

        /* ---- Donate Modal ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: linear-gradient(160deg, #1a1730, #2d2555);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 36px;
            max-width: 480px;
            width: 90%;
            position: relative;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #fff; }
        .modal-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 8px;
        }
        .modal-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 0.88rem;
            margin: 0 0 28px;
        }
        .qr-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .qr-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        .qr-img {
            width: 140px;
            height: 140px;
            border-radius: 10px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            overflow: hidden;
        }
        .qr-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .qr-placeholder {
            width: 140px;
            height: 140px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            border: 2px dashed rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            text-align: center;
            gap: 6px;
        }
        .qr-placeholder .qr-icon { font-size: 2rem; }
        .qr-label {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.55);
            margin-bottom: 4px;
        }
        .qr-sublabel { font-size: 0.72rem; color: rgba(255,255,255,0.3); }
        .modal-divider {
            text-align: center;
            color: rgba(255,255,255,0.25);
            font-size: 0.8rem;
            margin: 20px 0 16px;
        }
        .other-pay-row { display: flex; justify-content: center; gap: 12px; }
        .other-pay-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            font-size: 0.83rem;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .other-pay-btn:hover {
            background: rgba(52,152,219,0.15);
            border-color: #3498db;
            color: #3498db;
        }

        /* ---- Not Found ---- */
        .not-found {
            text-align: center;
            padding: 100px 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .not-found h2 { font-size: 1.5rem; color: rgba(255,255,255,0.7); }
        .not-found a { color: #3498db; }

        @media (max-width: 768px) {
            .page-layout { grid-template-columns: 1fr; }
            .sidebar { order: -1; }
            .post-header, .post-content, .post-footer, .comments-section {
                padding-left: 20px;
                padding-right: 20px;
            }
            .post-title { font-size: 1.5rem; }
            .post-cover { height: 200px; }
            .qr-row { grid-template-columns: 1fr 1fr; }
            .fab-donate { bottom: 20px; right: 20px; }
        }
    </style>
</head>

<script src="js/posts.js"></script>
<script>
    // ---- Language ----
    const LANG_KEY = 'macle_lang';
    let currentLang = localStorage.getItem(LANG_KEY) || 'zh';

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        document.querySelectorAll('[data-zh]').forEach(el => {
            const val = el.getAttribute('data-' + lang);
            if (val) el.textContent = val;
        });
        document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }

    // Apply saved lang to nav immediately
    (function() {
        if (currentLang === 'en') {
            document.getElementById('btn-zh').classList.remove('active');
            document.getElementById('btn-en').classList.add('active');
        }
    })();

    // ---- Donate Modal ----
    function openDonate() {
        document.getElementById('donateModal').classList.add('open');
    }
    function closeDonate() {
        document.getElementById('donateModal').classList.remove('open');
    }
    function closeDonateOnOverlay(e) {
        if (e.target === document.getElementById('donateModal')) closeDonate();
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDonate(); });

    // ---- Share ----
    function copyLink() {
        navigator.clipboard.writeText(location.href).then(() => {
            showToast('链接已复制');
        });
    }
    function shareToTelegram(title) {
        window.open('https://t.me/share/url?url=' + encodeURIComponent(location.href) + '&text=' + encodeURIComponent(title), '_blank');
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.textContent = msg;
        Object.assign(t.style, {
            position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
            background: 'rgba(52,152,219,0.9)', color: '#fff',
            padding: '8px 20px', borderRadius: '20px',
            fontSize: '0.85rem', zIndex: '999', transition: 'opacity 0.3s'
        });
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
    }

    // ---- Table of Contents ----
    function buildToc(headings) {
        if (!headings.length) return '';
        return headings.map(h => `
            <li>
                <a href="#${h.id}" class="${h.level === 3 ? 'toc-h3' : ''}">
                    ${h.text}
                </a>
            </li>`).join('');
    }

    // ---- Date Format ----
    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.getFullYear() + ' 年 ' + (d.getMonth() + 1) + ' 月 ' + d.getDate() + ' 日';
    }

    // ---- Render Post ----
    function renderPost() {
        const params = new URLSearchParams(location.search);
        const id = params.get('id');
        const post = POSTS.find(p => p.id === id);
        const app = document.getElementById('app');

        if (!post) {
            app.innerHTML = `<div class="not-found">
                <h2>文章未找到</h2>
                <p><a href="blog.html">返回博客列表</a></p>
            </div>`;
            return;
        }

        document.title = post.title + ' - Macle Chen';

        // Configure marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        const contentHtml = marked.parse(post.content);

        // Extract headings for TOC
        const headings = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = contentHtml;
        tempDiv.querySelectorAll('h2, h3').forEach((el, i) => {
            const id = 'heading-' + i;
            el.id = id;
            headings.push({ id, text: el.textContent, level: parseInt(el.tagName[1]) });
        });

        // Related posts
        const related = POSTS
            .filter(p => p.id !== post.id &&
                (p.category === post.category || p.tags.some(t => post.tags.includes(t))))
            .slice(0, 4);

        app.innerHTML = `
        <div class="page-layout">
            <main>
                <article class="post-article">
                    ${post.cover ? `<img class="post-cover" src="${post.cover}" alt="${post.title}"
                        onerror="this.style.display='none'">` : ''}
                    <div class="post-header">
                        <div class="post-meta-top">
                            <span class="post-category">${post.category}</span>
                            <span class="post-date">${formatDate(post.date)}</span>
                        </div>
                        <h1 class="post-title">${post.title}</h1>
                        <div class="post-tags">
                            ${post.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}
                        </div>
                    </div>
                    <div class="post-content" id="postContent">
                        ${tempDiv.innerHTML}
                    </div>
                    <div class="post-footer">
                        <div class="share-btns">
                            <button class="share-btn" onclick="copyLink()">&#128279; 复制链接</button>
                            <button class="share-btn" onclick="shareToTelegram('${post.title.replace(/'/g, "\\'")}')">&#128240; Telegram</button>
                        </div>
                        <button class="donate-btn-inline" onclick="openDonate()">&#9749; 打赏支持</button>
                    </div>
                    <div class="comments-section">
                        <div class="comments-title">&#128172; 评论区</div>
                        <!-- =====================================================
                             Giscus 评论系统配置
                             使用步骤：
                             1. 在你的 GitHub 仓库中启用 Discussions 功能
                             2. 访问 https://giscus.app/ 选择你的仓库
                             3. 将下方 data-repo-id 和 data-category-id 替换为你的真实值
                             ===================================================== -->
                        <div class="giscus-notice" id="giscusNotice">
                            评论功能由 <a href="https://giscus.app" target="_blank">Giscus</a> 提供，需要 GitHub 账号登录。
                            <br>仓库管理员：请在 <a href="https://giscus.app" target="_blank">giscus.app</a> 获取配置参数后更新 post.html。
                        </div>
                        <script src="https://giscus.app/client.js"
                            data-repo="MacleChen/MacleChen.github.io"
                            data-repo-id="R_kgDOLVPSkA"
                            data-category="General"
                            data-category-id="DIC_kwDOLVPSkM4C3uNw"
                            data-mapping="pathname"
                            data-strict="0"
                            data-reactions-enabled="1"
                            data-emit-metadata="0"
                            data-input-position="bottom"
                            data-theme="dark_protanopia"
                            data-lang="zh-CN"
                            crossorigin="anonymous"
                            async>
                        <\/script>
                    </div>
                </article>
            </main>

            <aside class="sidebar">
                ${headings.length ? `
                <div class="sidebar-card">
                    <div class="sidebar-title">目录</div>
                    <ul class="toc-list">${buildToc(headings)}</ul>
                </div>` : ''}

                ${related.length ? `
                <div class="sidebar-card">
                    <div class="sidebar-title">相关文章</div>
                    ${related.map(r => `
                        <a class="related-post" href="post.html?id=${r.id}">
                            <span class="related-post-title">${r.title}</span>
                            <span class="related-post-date">${formatDate(r.date)}</span>
                        </a>`).join('')}
                </div>` : ''}

                <div class="sidebar-card">
                    <div class="sidebar-title">关于作者</div>
                    <p style="font-size:0.875rem;color:rgba(255,255,255,0.55);line-height:1.7;margin:0 0 12px">
                        iOS开发者，专注逆向工程、音视频处理。
                    </p>
                    <a href="index.html" style="color:#3498db;font-size:0.85rem;text-decoration:none">
                        查看完整介绍 →
                    </a>
                </div>
            </aside>
        </div>`;

        // Smooth scroll for TOC
        document.querySelectorAll('.toc-list a').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                const el = document.getElementById(a.getAttribute('href').slice(1));
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });
    }

    renderPost();
</script>
</body>
</html>
