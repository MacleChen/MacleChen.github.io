<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 — Macle Chen</title>
    <style>
        :root {
            --bg:         #0d1117;
            --bg-card:    #161b22;
            --bg-hover:   #1c2128;
            --border:     rgba(255,255,255,0.08);
            --text:       #e6edf3;
            --text-muted: #8b949e;
            --accent:     #4a9eff;
            --accent-bg:  rgba(74,158,255,0.1);
            --accent-bd:  rgba(74,158,255,0.25);
            --tag-bg:     rgba(255,255,255,0.05);
            --nav-h:      54px;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            font-size: 15px; line-height: 1.6; min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }

        /* NAV */
        .nav {
            position: sticky; top: 0; z-index: 100;
            height: var(--nav-h);
            background: rgba(13,17,23,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 28px; gap: 8px;
        }
        .nav-logo { font-size: 0.98rem; font-weight: 700; color: var(--text); margin-right: auto; }
        .nav-logo em { color: var(--accent); font-style: normal; }
        .nav-links { display: flex; gap: 2px; }
        .nav-links a {
            color: var(--text-muted); padding: 5px 11px;
            border-radius: 6px; font-size: 0.875rem; transition: all 0.15s;
        }
        .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav-links a.active { color: var(--text); }
        .lang-toggle {
            display: flex; overflow: hidden;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 6px;
        }
        .lang-toggle button {
            background: transparent; border: none;
            color: var(--text-muted); padding: 3px 10px;
            font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
            font-family: inherit;
        }
        .lang-toggle button.active { background: var(--accent); color: #fff; }
        .lang-toggle button:hover:not(.active) { color: var(--text); }

        /* PAGE */
        .page-wrap { max-width: 780px; margin: 0 auto; padding: 44px 20px 80px; }

        /* HEADER */
        .page-header { margin-bottom: 36px; }
        .page-header h1 {
            font-size: 1.6rem; font-weight: 800; margin: 0 0 6px;
            letter-spacing: -0.4px;
        }
        .page-header p { font-size: 0.9rem; color: var(--text-muted); margin: 0; }
        .header-stats {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 12px;
            font-size: 0.78rem; color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 20px; padding: 3px 12px;
        }

        /* CONTROLS */
        .controls {
            display: flex; flex-wrap: wrap; gap: 10px;
            align-items: center; margin-bottom: 28px;
        }
        .search-wrap {
            flex: 1; min-width: 180px; max-width: 280px; position: relative;
        }
        .search-wrap input {
            width: 100%; padding: 8px 14px 8px 36px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 0.875rem;
            outline: none; transition: border-color 0.2s; font-family: inherit;
        }
        .search-wrap input:focus { border-color: var(--accent); }
        .search-wrap input::placeholder { color: var(--text-muted); }
        .search-ico {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.8rem; pointer-events: none;
        }
        .cats { display: flex; flex-wrap: wrap; gap: 6px; }
        .cat-btn {
            padding: 5px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-muted); font-size: 0.82rem;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* POST LIST */
        .post-list {}
        .post-row {
            display: flex; align-items: flex-start; gap: 16px;
            padding: 22px 0; border-bottom: 1px solid var(--border);
            transition: background 0.15s; border-radius: 0;
            cursor: pointer;
        }
        .post-row:first-child { padding-top: 8px; }
        .post-row:last-child { border-bottom: none; }
        .post-row:hover .row-title { color: var(--accent); }
        .post-row-body { flex: 1; min-width: 0; }
        .row-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
        .row-cat {
            padding: 2px 8px; font-size: 0.7rem; font-weight: 600;
            background: var(--accent-bg); border: 1px solid var(--accent-bd);
            border-radius: 4px; color: var(--accent);
        }
        .row-date { font-size: 0.77rem; color: var(--text-muted); }
        .row-readtime { font-size: 0.77rem; color: var(--text-muted); }
        .row-title {
            font-size: 1.02rem; font-weight: 700; margin: 0 0 7px;
            line-height: 1.5; color: var(--text); transition: color 0.15s;
        }
        .row-summary {
            font-size: 0.85rem; color: var(--text-muted);
            line-height: 1.65; margin: 0 0 10px;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .row-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .row-tag {
            padding: 2px 7px; font-size: 0.7rem;
            background: var(--tag-bg); border: 1px solid var(--border);
            border-radius: 4px; color: var(--text-muted);
        }
        .post-row-arrow {
            color: var(--text-muted); font-size: 1rem; padding-top: 2px;
            transition: color 0.15s, transform 0.15s; flex-shrink: 0;
        }
        .post-row:hover .post-row-arrow { color: var(--accent); transform: translateX(3px); }

        /* EMPTY */
        .empty {
            text-align: center; padding: 60px 20px;
            color: var(--text-muted); font-size: 0.9rem;
        }

        /* PAGINATION */
        .pagination {
            display: flex; align-items: center; justify-content: center;
            gap: 4px; margin-top: 32px; padding-top: 28px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .pg-btn {
            min-width: 36px; height: 36px; padding: 0 10px;
            border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-muted);
            font-size: 0.875rem; cursor: pointer; transition: all 0.15s;
            font-family: inherit; display: inline-flex;
            align-items: center; justify-content: center;
        }
        .pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .pg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .pg-ellipsis { color: var(--text-muted); padding: 0 2px; line-height: 36px; font-size: 0.9rem; }
        .pg-info { font-size: 0.78rem; color: var(--text-muted); margin-left: 8px; }

        /* CAT COUNT */
        .cat-count {
            display: inline-block; font-size: 0.68rem;
            background: rgba(255,255,255,0.1); border-radius: 10px;
            padding: 0 5px; margin-left: 3px; vertical-align: middle;
        }
        .cat-btn.active .cat-count { background: rgba(255,255,255,0.25); }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--border);
            padding: 18px; text-align: center;
            font-size: 0.78rem; color: var(--text-muted);
        }

        @media (max-width: 560px) {
            .page-header h1 { font-size: 1.3rem; }
            .controls { flex-direction: column; align-items: stretch; }
            .search-wrap { max-width: 100%; }
            .post-row-arrow { display: none; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">Macle<em>.</em>dev</a>
    <div class="nav-links">
        <a href="index.html" data-zh="首页" data-en="Home">首页</a>
        <a href="blog.html" class="active" data-zh="博客" data-en="Blog">博客</a>
        <a href="index.html#contact" data-zh="联系" data-en="Contact">联系</a>
    </div>
    <div class="lang-toggle">
        <button id="btn-zh" onclick="setLang('zh')" class="active">中</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
</nav>

<div class="page-wrap">
    <div class="page-header">
        <h1 data-zh="全部文章" data-en="All Posts">全部文章</h1>
        <p data-zh="分享 iOS 开发、逆向工程、音视频处理等实战经验" data-en="Sharing practical experience in iOS development, reverse engineering, and audio/video processing">分享 iOS 开发、逆向工程、音视频处理等实战经验</p>
        <div class="header-stats" id="statsBar">0 篇文章</div>
    </div>

    <div class="controls">
        <div class="search-wrap">
            <span class="search-ico">⌕</span>
            <input type="text" id="searchInput"
                   placeholder="搜索文章..." data-placeholder-zh="搜索文章..." data-placeholder-en="Search posts..."
                   oninput="currentPage=1; renderPosts()">
        </div>
        <div class="cats" id="cats"></div>
    </div>

    <div class="post-list" id="postList"></div>
</div>

<footer>
    <p data-zh="© 2025 Macle Chen" data-en="© 2025 Macle Chen">© 2025 Macle Chen</p>
</footer>

<script src="js/posts.js"></script>
<script>
    const LANG_KEY = 'macle_lang';
    let currentLang = localStorage.getItem(LANG_KEY) || 'zh';
    let activeCategory = 'all';
    let currentPage = 1;
    const PAGE_SIZE = 20;

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        document.querySelectorAll('[data-zh]').forEach(el => {
            const val = el.getAttribute('data-' + lang);
            if (val) el.textContent = val;
        });
        // Placeholder
        const inp = document.getElementById('searchInput');
        const ph = inp.getAttribute('data-placeholder-' + lang);
        if (ph) inp.placeholder = ph;
        document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        buildCats();
        renderPosts();
    }

    function fmtDate(str) {
        const d = new Date(str);
        return currentLang === 'en'
            ? d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
            : d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
    }

    function estRead(content) {
        if (!content) return '';
        const words = content.replace(/```[\s\S]*?```/g, '').replace(/[#*`>\[\]]/g, '').length;
        const mins = Math.max(1, Math.round(words / 300));
        return currentLang === 'en' ? mins + ' min read' : mins + ' 分钟阅读';
    }

    function buildCats() {
        const allLabel = currentLang === 'en' ? 'All' : '全部';
        const cats = ['all', ...new Set(POSTS.map(p => p.category))];
        const counts = {};
        POSTS.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });
        document.getElementById('cats').innerHTML = cats.map(c => {
            const label = c === 'all' ? allLabel : (currentLang === 'en' ? (POSTS.find(p => p.category === c)?.categoryEn || c) : c);
            const count = c === 'all' ? POSTS.length : (counts[c] || 0);
            return `<button class="cat-btn ${c === activeCategory ? 'active' : ''}"
                    onclick="setCategory('${c}')" data-cat="${c}">
                ${label}<span class="cat-count">${count}</span>
            </button>`;
        }).join('');
    }

    function setCategory(cat) {
        activeCategory = cat;
        currentPage = 1;
        buildCats();
        renderPosts();
    }

    function renderPosts() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = POSTS.filter(p => {
            const matchCat = activeCategory === 'all' || p.category === activeCategory;
            const title = currentLang === 'en' ? (p.titleEn || p.title) : p.title;
            const summary = currentLang === 'en' ? (p.summaryEn || p.summary) : p.summary;
            const matchQ = !q || title.toLowerCase().includes(q) || summary.toLowerCase().includes(q)
                || p.tags.some(t => t.toLowerCase().includes(q));
            return matchCat && matchQ;
        });

        const total = filtered.length;
        const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;

        const statsEl = document.getElementById('statsBar');
        statsEl.textContent = currentLang === 'en'
            ? total + ' post' + (total !== 1 ? 's' : '')
            : total + ' 篇文章';

        const list = document.getElementById('postList');
        if (!total) {
            list.innerHTML = `<div class="empty">${currentLang === 'en' ? 'No posts found.' : '没有找到相关文章。'}</div>`;
            return;
        }

        const start = (currentPage - 1) * PAGE_SIZE;
        const pagePosts = filtered.slice(start, start + PAGE_SIZE);

        list.innerHTML = pagePosts.map(p => {
            const title = currentLang === 'en' ? (p.titleEn || p.title) : p.title;
            const summary = currentLang === 'en' ? (p.summaryEn || p.summary) : p.summary;
            const cat = currentLang === 'en' ? (p.categoryEn || p.category) : p.category;
            return `
            <a class="post-row" href="post.html?id=${p.id}">
                <div class="post-row-body">
                    <div class="row-meta">
                        <span class="row-cat">${cat}</span>
                        <span class="row-date">${fmtDate(p.date)}</span>
                    </div>
                    <div class="row-title">${title}</div>
                    <p class="row-summary">${summary}</p>
                    <div class="row-tags">
                        ${p.tags.map(t => `<span class="row-tag">${t}</span>`).join('')}
                    </div>
                </div>
                <span class="post-row-arrow">→</span>
            </a>`;
        }).join('');

        if (totalPages > 1) renderPagination(totalPages, total);
    }

    function renderPagination(totalPages, total) {
        const pages = [];
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                pages.push(i);
            } else if (pages[pages.length - 1] !== '…') {
                pages.push('…');
            }
        }
        const pageInfo = currentLang === 'en'
            ? `Page ${currentPage} / ${totalPages}`
            : `第 ${currentPage} / ${totalPages} 页`;
        const prevLabel = '‹';
        const nextLabel = '›';

        const html = `<div class="pagination">
            <button class="pg-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>${prevLabel}</button>
            ${pages.map(p => p === '…'
                ? `<span class="pg-ellipsis">…</span>`
                : `<button class="pg-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`
            ).join('')}
            <button class="pg-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>${nextLabel}</button>
            <span class="pg-info">${pageInfo}</span>
        </div>`;
        document.getElementById('postList').insertAdjacentHTML('beforeend', html);
    }

    function goToPage(page) {
        currentPage = page;
        renderPosts();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    setLang(currentLang);
</script>
</body>
</html>
