<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影 — Macle Chen</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6CWFXJWEB1"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-6CWFXJWEB1');</script>
    <meta name="description" content="Macle Chen 的摄影集，用镜头记录生活">
    <meta property="og:title" content="摄影 — Macle Chen">
    <meta property="og:type" content="website">
    <style>
        :root {
            --bg:         #0d1117;
            --bg-card:    #161b22;
            --border:     rgba(255,255,255,0.08);
            --text:       #e6edf3;
            --text-muted: #8b949e;
            --accent:     #4a9eff;
            --nav-h:      54px;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            margin: 0; background: var(--bg); color: var(--text);
            font-size: 15px; line-height: 1.6; min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }

        /* ── NAV ── */
        .nav {
            position: sticky; top: 0; z-index: 100;
            height: var(--nav-h);
            background: rgba(13,17,23,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 28px; gap: 8px;
        }
        .nav-logo { font-size: 0.98rem; font-weight: 700; color: var(--text); margin-right: auto; }
        .nav-logo em { color: var(--accent); font-style: normal; }
        .nav-links { display: flex; gap: 2px; }
        .nav-links a { color: var(--text-muted); padding: 5px 11px; border-radius: 6px; font-size: 0.875rem; transition: all 0.15s; }
        .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav-links a.active { color: var(--text); }
        .lang-toggle { display: flex; overflow: hidden; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; }
        .lang-toggle button { background: transparent; border: none; color: var(--text-muted); padding: 3px 10px; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .lang-toggle button.active { background: var(--accent); color: #fff; }
        .lang-toggle button:hover:not(.active) { color: var(--text); }
        .theme-btn { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── PAGE ── */
        .page-wrap { max-width: 1200px; margin: 0 auto; padding: 44px 24px 100px; }

        /* ── HERO ── */
        .hero { margin-bottom: 52px; }
        .hero-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.5px; margin: 0 0 6px; }
        .hero-sub { font-size: 0.9rem; color: var(--text-muted); margin: 0 0 22px; }
        .hero-stats { display: flex; gap: 28px; }
        .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; }

        /* ── FILTER ── */
        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 40px; }
        .filter-tag { padding: 4px 14px; font-size: 0.78rem; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .filter-tag:hover { border-color: var(--accent); color: var(--accent); }
        .filter-tag.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ── TIMELINE ── */
        .year-group { margin-bottom: 56px; }
        .year-divider { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
        .year-label { font-size: 1.6rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; flex-shrink: 0; }
        .year-line { flex: 1; height: 1px; background: var(--border); }
        .month-group { margin-bottom: 40px; }
        .month-label {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 1.4px;
            text-transform: uppercase; color: var(--text-muted);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .month-label::before { content: ''; display: block; width: 3px; height: 10px; background: var(--accent); border-radius: 2px; flex-shrink: 0; }

        /* ── PHOTO GRID ── */
        .photo-grid {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ── PHOTO CARD ── */
        .photo-card {
            cursor: pointer;
            padding-bottom: 48px;    /* generous white space between photos */
        }

        /* Image wrapper — overflow hidden only on image, not the whole card */
        .photo-img-wrap {
            overflow: hidden;
            border-radius: 6px;
            background: #0d0d0d;
            position: relative;
        }

        .photo-img-wrap img {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .photo-card:hover .photo-img-wrap img { transform: scale(1.025); }

        /* HEIC fallback banner (shown when img fails) */
        .heic-banner {
            display: none;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: 6px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.82rem;
        }
        .heic-banner.visible { display: flex; }
        .heic-banner span { font-size: 1.6rem; opacity: 0.4; }

        /* Caption — below the image */
        .photo-caption {
            padding: 12px 2px 0;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
        }

        .caption-desc {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text);
            line-height: 1.5;
            letter-spacing: 0.1px;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .caption-meta-right {
            flex-shrink: 0;
            font-size: 0.78rem;
            color: var(--text-muted);
            text-align: right;
            white-space: nowrap;
        }
        .caption-loc { display: none; } /* merged into caption-meta-right */

        /* ── EMPTY STATE ── */
        .empty-state { display: none; text-align: center; padding: 100px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 3rem; opacity: 0.3; margin-bottom: 16px; }
        .empty-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
        .empty-hint { font-size: 0.85rem; }
        .empty-hint a { color: var(--accent); }

        /* ── LIGHTBOX ── */
        .lightbox {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.97);
            display: none;
            flex-direction: column;
        }
        .lightbox.open { display: flex; }

        /* top bar */
        .lb-bar {
            flex-shrink: 0;
            height: 52px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .lb-bar-left { display: flex; align-items: center; gap: 14px; }
        .lb-counter { font-size: 0.8rem; color: rgba(255,255,255,0.35); font-family: monospace; }
        .lb-desc-bar { font-size: 0.9rem; color: rgba(255,255,255,0.75); font-weight: 500; }
        .lb-close {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.6);
            font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .lb-close:hover { background: rgba(255,255,255,0.16); color: #fff; }

        /* main stage */
        .lb-stage {
            flex: 1; min-height: 0;
            display: flex; align-items: center; justify-content: center;
            position: relative; padding: 0 70px;
        }
        .lb-img-wrap {
            max-width: 100%; max-height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .lb-img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
            display: block;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
        }
        .lb-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.08); border: none;
            color: rgba(255,255,255,0.7); font-size: 1.3rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .lb-nav:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .lb-nav:disabled { opacity: 0.15; cursor: default; }
        .lb-prev { left: 14px; }
        .lb-next { right: 14px; }

        /* bottom meta strip */
        .lb-meta-strip {
            flex-shrink: 0;
            padding: 12px 24px;
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
        }
        .lb-meta-item { display: flex; flex-direction: column; gap: 1px; }
        .lb-meta-key { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.3); }
        .lb-meta-val { font-size: 0.8rem; color: rgba(255,255,255,0.7); font-family: ui-monospace,'SF Mono',monospace; }
        .lb-meta-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

        /* ── FOOTER ── */
        footer { border-top: 1px solid var(--border); padding: 18px 24px; text-align: center; font-size: 0.78rem; color: var(--text-muted); }

        /* ── LIGHT THEME ── */
        [data-theme="light"] { --bg:#f5f5f5; --bg-card:#fff; --border:rgba(0,0,0,.1); --text:#1a1a1a; --text-muted:#666; --accent:#0969da; }
        [data-theme="light"] .nav { background: rgba(245,245,245,0.96); }
        [data-theme="light"] .theme-btn { background: rgba(0,0,0,0.04); }
        [data-theme="light"] .lightbox { background: rgba(0,0,0,0.95); }
        [data-theme="light"] .year-label { color: var(--text); }

        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            .photo-img-wrap img { aspect-ratio: 4/3; }
            .heic-banner { aspect-ratio: 4/3; }
            .lb-stage { padding: 0 52px; }
            .photo-card { padding-bottom: 32px; }
        }
        @media (max-width: 480px) {
            .hero-title { font-size: 1.6rem; }
            .lb-meta-strip { gap: 12px; }
            .lb-stage { padding: 0 40px; }
            .photo-card { padding-bottom: 24px; }
        }
    </style>
</head>

<script>
const LANG_KEY  = 'macle_lang';
const THEME_KEY = 'macle_theme';
let currentLang = localStorage.getItem(LANG_KEY) || 'zh';

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-zh]').forEach(el => {
        const v = el.getAttribute('data-' + lang);
        if (v !== null) el.innerHTML = v;
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    render();
}

function initTheme() {
    const saved = localStorage.getItem(THEME_KEY) || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
}
function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(THEME_KEY, next);
    document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
}

// ── Data ──────────────────────────────────────────────────────────────────────
const photos = (typeof PHOTOS !== 'undefined' ? PHOTOS : [])
    .slice()
    .sort((a, b) => new Date(b.date) - new Date(a.date));

const MONTH_ZH = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];

function groupPhotos(list) {
    const map = {};
    list.forEach(p => {
        const d  = new Date(p.date);
        const yr = d.getFullYear();
        const mo = d.getMonth();
        if (!map[yr]) map[yr] = {};
        const key = mo;
        if (!map[yr][key]) map[yr][key] = { year: yr, month: mo, photos: [] };
        map[yr][key].photos.push(p);
    });
    return Object.keys(map).sort((a,b)=>b-a).map(yr => ({
        year: yr,
        months: Object.keys(map[yr]).sort((a,b)=>b-a).map(k => map[yr][k])
    }));
}

// ── Render ────────────────────────────────────────────────────────────────────
let activeTag     = '';
let visiblePhotos = [];

function render() {
    // Stats
    const total     = photos.length;
    const locations = [...new Set(photos.map(p=>p.location).filter(Boolean))];
    const statsEl   = document.getElementById('heroStats');
    statsEl.innerHTML = total ? `
        <div><div class="stat-num">${total}</div><div class="stat-label">${currentLang==='zh'?'张照片':'Photos'}</div></div>
        ${locations.length?`<div><div class="stat-num">${locations.length}</div><div class="stat-label">${currentLang==='zh'?'个地点':'Locations'}</div></div>`:''}
    ` : '';

    // Filter tags
    const allTags = [...new Set(photos.flatMap(p=>p.tags||[]))];
    const barEl = document.getElementById('filterBar');
    barEl.innerHTML = allTags.length ? [
        `<button class="filter-tag ${activeTag===''?'active':''}" onclick="setTag('')">${currentLang==='zh'?'全部':'All'}</button>`,
        ...allTags.map(t=>`<button class="filter-tag ${activeTag===t?'active':''}" onclick="setTag('${escAttr(t)}')">${escHtml(t)}</button>`)
    ].join('') : '';

    // Filter
    visiblePhotos = activeTag ? photos.filter(p=>(p.tags||[]).includes(activeTag)) : photos;

    const timelineEl = document.getElementById('timeline');
    const emptyEl    = document.getElementById('emptyState');

    if (!visiblePhotos.length) {
        timelineEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
    }
    emptyEl.style.display = 'none';

    const groups = groupPhotos(visiblePhotos);
    timelineEl.innerHTML = groups.map(g => `
        <div class="year-group">
            <div class="year-divider">
                <span class="year-label">${g.year}</span>
                <div class="year-line"></div>
            </div>
            ${g.months.map(m => {
                const moLabel = currentLang === 'zh'
                    ? MONTH_ZH[m.month] + '月'
                    : new Date(m.year, m.month, 1).toLocaleDateString('en-US', {month:'long'});
                return `
                <div class="month-group">
                    <div class="month-label">${moLabel} · ${m.photos.length}</div>
                    <div class="photo-grid">
                        ${m.photos.map((p, i) => {
                            const idx  = visiblePhotos.indexOf(p);
                            const metaParts = [p.aperture, p.shutter, p.iso?'ISO '+p.iso:''].filter(Boolean);
                            return `
                            <div class="photo-card" onclick="openLightbox(${idx})">
                                <div class="photo-img-wrap">
                                    <img src="${escAttr(p.src)}"
                                         alt="${escAttr(p.description||'')}"
                                         loading="lazy"
                                         onerror="this.style.display='none';this.nextElementSibling.classList.add('visible')">
                                    <div class="heic-banner">
                                        <span>🖼</span>
                                        <div>${escHtml(p.description||'')}</div>
                                        <div style="font-size:0.72rem;opacity:0.55">HEIC 格式 · 点击在灯箱中查看</div>
                                    </div>
                                </div>
                                <div class="photo-caption">
                                    <span class="caption-desc">${escHtml(p.description||'')}</span>
                                    <span class="caption-meta-right">${[p.location ? '📍 '+escHtml(p.location) : '', p.date||''].filter(Boolean).join(' · ')}</span>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            }).join('')}
        </div>`).join('');
}

function setTag(tag) { activeTag = tag; render(); }

// ── Lightbox ─────────────────────────────────────────────────────────────────
let currentIdx = 0;

function openLightbox(idx) {
    currentIdx = idx;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
}
function lbNav(dir) {
    const next = currentIdx + dir;
    if (next < 0 || next >= visiblePhotos.length) return;
    currentIdx = next;
    updateLightbox();
}
function updateLightbox() {
    const p = visiblePhotos[currentIdx];
    document.getElementById('lbImg').src    = p.src;
    document.getElementById('lbImg').alt    = p.description || '';
    document.getElementById('lbCounter').textContent = `${currentIdx+1} / ${visiblePhotos.length}`;
    document.getElementById('lbDescBar').textContent = p.description || '';
    document.getElementById('lbPrev').disabled = currentIdx === 0;
    document.getElementById('lbNext').disabled = currentIdx === visiblePhotos.length - 1;

    // Meta strip
    const metaDefs = [
        p.camera      ? { key: currentLang==='zh'?'相机':'Camera',    val: p.camera }      : null,
        p.lens        ? { key: currentLang==='zh'?'镜头':'Lens',      val: p.lens }        : null,
        p.aperture    ? { key: currentLang==='zh'?'光圈':'Aperture',  val: p.aperture }    : null,
        p.shutter     ? { key: currentLang==='zh'?'快门':'Shutter',   val: p.shutter }     : null,
        p.iso         ? { key: 'ISO',                                  val: p.iso }         : null,
        p.focalLength ? { key: currentLang==='zh'?'焦距':'Focal',     val: p.focalLength } : null,
        p.location    ? { key: currentLang==='zh'?'地点':'Location',  val: p.location }    : null,
        p.date        ? { key: currentLang==='zh'?'日期':'Date',      val: p.date }        : null,
    ].filter(Boolean);

    document.getElementById('lbMetaStrip').innerHTML = metaDefs.length
        ? metaDefs.map((m, i) => `
            ${i > 0 ? '<div class="lb-meta-sep"></div>' : ''}
            <div class="lb-meta-item">
                <span class="lb-meta-key">${m.key}</span>
                <span class="lb-meta-val">${escHtml(String(m.val))}</span>
            </div>`).join('')
        : `<div class="lb-meta-item"><span class="lb-meta-val" style="color:rgba(255,255,255,0.3)">${p.date||''}</span></div>`;
}

// keyboard
document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
});

// close on backdrop
document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox') ||
        e.target.classList.contains('lb-stage') ||
        e.target.classList.contains('lb-img-wrap')) closeLightbox();
});

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

initTheme();
setLang(currentLang);
</script>
