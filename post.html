    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0; padding: 0;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        /* ---- Navigation ---- */
        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13,17,23,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 28px;
            display: flex; align-items: center; gap: 8px;
            height: 54px;
        }
        .nav-logo {
            font-size: 0.98rem; font-weight: 700;
            color: #e6edf3; text-decoration: none; margin-right: auto;
        }
        .nav-logo em { color: #4a9eff; font-style: normal; }
        .nav-links { display: flex; gap: 2px; }
        .nav-links a {
            color: #8b949e; text-decoration: none;
            padding: 5px 11px; border-radius: 6px;
            font-size: 0.875rem; transition: all 0.15s;
        }
        .nav-links a:hover { color: #e6edf3; background: rgba(255,255,255,0.05); }
        .lang-toggle {
            display: flex; overflow: hidden;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
        }
        .lang-toggle button {
            background: transparent; border: none;
            color: #8b949e; padding: 3px 10px;
            font-size: 0.78rem; cursor: pointer; transition: all 0.15s;
            font-family: inherit;
        }
        .lang-toggle button.active { background: #4a9eff; color: #fff; }
        .lang-toggle button:hover:not(.active) { color: #e6edf3; }

        /* ---- Layout ---- */
        .page-layout {
            max-width: 1080px;
            margin: 0 auto;
            padding: 36px 20px 100px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 240px;
            gap: 32px;
            align-items: start;
        }

        /* ---- Post Article ---- */
        .post-article {
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            min-width: 0; /* prevent grid item from overflowing */
        }
        .post-cover {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }
        .post-cover-gradient {
            width: 100%; height: 180px; display: flex;
            align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.6);
            position: relative; overflow: hidden;
        }
        .post-cover-gradient::before {
            content: ''; position: absolute; inset: 0;
            background: inherit; filter: blur(0px);
        }
        .post-header {
            padding: 32px 40px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .post-meta-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .post-category {
            padding: 4px 12px;
            background: rgba(52,152,219,0.2);
            color: #3498db;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .post-date {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }
        .post-title {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1.4;
            color: #fff;
            margin: 0 0 16px;
        }
        .post-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .post-tag {
            padding: 3px 10px;
            background: rgba(255,255,255,0.07);
            border-radius: 10px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
        }

        /* ---- Markdown Content ---- */
        .post-content {
            padding: 32px 40px 40px;
            line-height: 1.85;
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
            overflow-wrap: break-word;
            word-break: break-word;
            overflow-x: auto;
        }
        .post-content h1, .post-content h2, .post-content h3 {
            color: #fff;
            line-height: 1.4;
        }
        .post-content h1 { font-size: 1.75rem; margin: 40px 0 20px; }
        .post-content h2 {
            font-size: 1.35rem;
            margin: 36px 0 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .post-content h3 { font-size: 1.1rem; margin: 28px 0 12px; }
        .post-content p { margin: 0 0 20px; }
        .post-content a { color: #3498db; text-decoration: none; }
        .post-content a:hover { text-decoration: underline; }
        .post-content strong { color: #fff; }
        .post-content code {
            background: rgba(255,255,255,0.1);
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 0.88em;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            color: #e06c75;
        }
        .post-content pre {
            border-radius: 12px;
            overflow-x: auto;
            margin: 20px 0;
            padding: 0;
        }
        .post-content pre code {
            background: transparent;
            padding: 20px;
            border-radius: 12px;
            display: block;
            font-size: 0.88rem;
            line-height: 1.7;
            color: inherit;
        }
        .post-content blockquote {
            border-left: 4px solid #3498db;
            margin: 20px 0;
            padding: 12px 20px;
            background: rgba(52,152,219,0.08);
            border-radius: 0 8px 8px 0;
            color: rgba(255,255,255,0.7);
        }
        .post-content .table-wrap {
            overflow-x: auto;
            margin: 20px 0;
            border-radius: 8px;
        }
        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
            font-size: 0.9rem;
        }
        .post-content th {
            background: rgba(52,152,219,0.2);
            padding: 10px 14px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            color: #3498db;
        }
        .post-content td {
            padding: 9px 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .post-content tr:nth-child(even) td {
            background: rgba(255,255,255,0.03);
        }
        .post-content ul, .post-content ol {
            padding-left: 24px;
            margin-bottom: 20px;
        }
        .post-content li { margin-bottom: 6px; }
        .post-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 16px 0;
        }
        .post-content hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 32px 0;
        }

        /* ---- Post Footer ---- */
        .post-footer {
            padding: 24px 40px;
            border-top: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .share-btns { display: flex; gap: 10px; }
        .share-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .share-btn:hover {
            background: rgba(52,152,219,0.2);
            border-color: #3498db;
            color: #3498db;
        }
        .donate-btn-inline {
            padding: 10px 24px;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }
        .donate-btn-inline:hover { opacity: 0.85; transform: scale(1.04); }

        /* ---- Comments ---- */
        .comments-section {
            padding: 32px 40px 40px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .comments-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 16px;
        }
        .giscus-hint {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            background: rgba(74,158,255,0.07);
            border: 1px solid rgba(74,158,255,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 24px;
        }
        .giscus-hint-icon { font-size: 1rem; }
        .giscus-login-btn {
            margin-left: auto;
            padding: 5px 14px;
            background: #4a9eff;
            color: #fff;
            border-radius: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
            transition: opacity 0.15s;
        }
        .giscus-login-btn:hover { opacity: 0.85; }

        /* ---- Sidebar ---- */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-card {
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
        }
        .sidebar-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 16px;
        }
        .toc-list { list-style: none; padding: 0; margin: 0; }
        .toc-list li { margin-bottom: 8px; }
        .toc-list a {
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
            display: block;
            padding: 2px 0;
        }
        .toc-list a:hover { color: #3498db; }
        .toc-h3 { padding-left: 14px !important; font-size: 0.82rem !important; }

        .related-post {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            text-decoration: none;
        }
        .related-post:last-child { border-bottom: none; padding-bottom: 0; }
        .related-post-title {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.4;
            transition: color 0.2s;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .related-post:hover .related-post-title { color: #3498db; }
        .related-post-date { font-size: 0.75rem; color: rgba(255,255,255,0.3); }

        /* ---- Floating Donate Button ---- */
        .fab-donate {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 50;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            border: none;
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(231,76,60,0.45);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fab-donate:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 28px rgba(231,76,60,0.6);
        }
        .fab-donate-label {
            position: fixed;
            bottom: 38px;
            right: 96px;
            background: rgba(15,12,41,0.9);
            color: rgba(255,255,255,0.85);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .fab-donate:hover + .fab-donate-label { opacity: 1; }

        /* ---- Donate Modal ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: linear-gradient(160deg, #1a1730, #2d2555);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 36px;
            max-width: 480px;
            width: 90%;
            position: relative;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #fff; }
        .modal-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 8px;
        }
        .modal-subtitle {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 0.88rem;
            margin: 0 0 28px;
        }
        .qr-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .qr-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        .qr-img {
            width: 160px;
            height: 200px;
            border-radius: 10px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            overflow: hidden;
        }
        .qr-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .qr-placeholder {
            width: 140px;
            height: 140px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            border: 2px dashed rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            text-align: center;
            gap: 6px;
        }
        .qr-placeholder .qr-icon { font-size: 2rem; }
        .qr-label {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.55);
            margin-bottom: 4px;
        }
        .qr-sublabel { font-size: 0.72rem; color: rgba(255,255,255,0.3); }

        /* ---- WeChat Share Modal ---- */
        .wechat-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 300;
            align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .wechat-modal-overlay.open { display: flex; }
        .wechat-modal {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px; padding: 28px; text-align: center;
            max-width: 280px; width: 90%;
        }
        .wechat-modal h3 { margin: 0 0 8px; font-size: 1rem; color: #fff; }
        .wechat-modal p { margin: 0 0 16px; font-size: 0.82rem; color: rgba(255,255,255,0.5); }
        #wechatQrImg { width: 180px; height: 180px; border-radius: 8px; background: #fff; }
        .wechat-url-box {
            margin-top: 14px; padding: 8px 12px;
            background: rgba(255,255,255,0.06); border-radius: 8px;
            font-size: 0.75rem; color: rgba(255,255,255,0.5);
            word-break: break-all; cursor: pointer; transition: background 0.2s;
        }
        .wechat-url-box:hover { background: rgba(255,255,255,0.1); }
        .wechat-modal-close {
            margin-top: 16px; padding: 8px 24px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; color: rgba(255,255,255,0.6);
            cursor: pointer; font-size: 0.85rem; font-family: inherit;
            transition: all 0.15s;
        }
        .wechat-modal-close:hover { background: rgba(255,255,255,0.14); color: #fff; }

        /* ---- Subscribe Form ---- */
        .subscribe-card {
            background: linear-gradient(135deg, rgba(74,158,255,0.08), rgba(52,152,219,0.05));
            border: 1px solid rgba(74,158,255,0.2);
            border-radius: 16px; padding: 20px; margin-top: 0;
        }
        .subscribe-title { font-size: 0.9rem; font-weight: 700; color: #fff; margin: 0 0 6px; }
        .subscribe-desc { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin: 0 0 14px; line-height: 1.5; }
        .subscribe-form { display: flex; flex-direction: column; gap: 8px; }
        .subscribe-input {
            width: 100%; padding: 9px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
            color: #e6edf3; font-size: 0.85rem; outline: none; font-family: inherit;
            transition: border-color 0.2s;
        }
        .subscribe-input:focus { border-color: #4a9eff; }
        .subscribe-input::placeholder { color: rgba(255,255,255,0.3); }
        .subscribe-btn {
            padding: 9px 16px; border-radius: 8px;
            background: #4a9eff; border: none; color: #fff;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s; font-family: inherit;
        }
        .subscribe-btn:hover { opacity: 0.85; }
        [data-theme="light"] .subscribe-title { color: #24292f; }
        [data-theme="light"] .subscribe-desc { color: rgba(0,0,0,0.5); }
        [data-theme="light"] .subscribe-input { background: #fff; border-color: rgba(0,0,0,0.12); color: #24292f; }
        [data-theme="light"] .subscribe-input::placeholder { color: rgba(0,0,0,0.3); }
        [data-theme="light"] .wechat-modal { background: #f6f8fa; }
        [data-theme="light"] .wechat-modal h3 { color: #24292f; }

        /* ---- Not Found ---- */
        .not-found {
            text-align: center;
            padding: 100px 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .not-found h2 { font-size: 1.5rem; color: rgba(255,255,255,0.7); }
        .not-found a { color: #3498db; }

        @media (max-width: 900px) {
            .page-layout {
                grid-template-columns: minmax(0, 1fr);
                padding: 24px 16px 80px;
            }
            .sidebar { order: -1; }
            .post-header, .post-content, .post-footer, .comments-section {
                padding-left: 20px;
                padding-right: 20px;
            }
            .post-title { font-size: 1.4rem; }
            .post-cover { height: 200px; }
            .qr-row { grid-template-columns: 1fr 1fr; }
            .fab-donate { bottom: 20px; right: 20px; }
        }
        @media (max-width: 480px) {
            .post-header, .post-content, .post-footer, .comments-section {
                padding-left: 16px;
                padding-right: 16px;
            }
        }

        /* ---- Reading Progress Bar ---- */
        #progress-bar {
            position: fixed; top: 0; left: 0; z-index: 300;
            height: 3px; width: 0%;
            background: linear-gradient(90deg, #4a9eff, #3498db);
            transition: width 0.1s linear;
            pointer-events: none;
        }

        /* ---- Code Copy Button ---- */
        .pre-wrap { position: relative; }
        .code-copy-btn {
            position: absolute; top: 10px; right: 10px;
            padding: 4px 10px; border-radius: 6px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6); font-size: 0.75rem; cursor: pointer;
            transition: all 0.2s; font-family: inherit; line-height: 1.4;
        }
        .code-copy-btn:hover { background: rgba(74,158,255,0.2); border-color: #4a9eff; color: #4a9eff; }
        .code-copy-btn.copied { background: rgba(46,160,67,0.2); border-color: #2ea043; color: #2ea043; }

        /* ---- Prev / Next Navigation ---- */
        .post-nav {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            padding: 24px 40px; border-top: 1px solid rgba(255,255,255,0.07);
        }
        .post-nav-item {
            display: flex; flex-direction: column; gap: 5px;
            padding: 14px 16px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            text-decoration: none; transition: all 0.2s;
        }
        .post-nav-item:hover { border-color: #4a9eff; background: rgba(74,158,255,0.05); }
        .post-nav-next { text-align: right; }
        .post-nav-label { font-size: 0.75rem; color: rgba(255,255,255,0.35); }
        .post-nav-title {
            font-size: 0.85rem; color: rgba(255,255,255,0.75); line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .post-nav-item:hover .post-nav-title { color: #4a9eff; }

        /* ---- Theme Toggle ---- */
        .theme-btn {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6); font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .theme-btn:hover { border-color: #4a9eff; color: #4a9eff; }

        /* ---- Back-to-Top Button ---- */
        .back-top {
            position: fixed; bottom: 100px; right: 32px; z-index: 50;
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(22,27,34,0.9); border: 1px solid rgba(255,255,255,0.12);

        .back-top.visible { opacity: 1; pointer-events: auto; }
        .back-top:hover { border-color: #4a9eff; color: #4a9eff; }

        /* ---- Light Theme Overrides ---- */
        [data-theme="light"] body { background: #f6f8fa; color: #24292f; }
        [data-theme="light"] .nav { background: rgba(246,248,250,0.96); border-bottom-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .nav-logo { color: #24292f; }
        [data-theme="light"] .nav-links a { color: #57606a; }
        [data-theme="light"] .nav-links a:hover { color: #24292f; background: rgba(0,0,0,0.05); }
        [data-theme="light"] .lang-toggle { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .lang-toggle button { color: #57606a; }
        [data-theme="light"] .theme-btn { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #57606a; }
        [data-theme="light"] .post-article { background: #fff; border-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .post-title { color: #24292f; }
        [data-theme="light"] .post-date { color: rgba(0,0,0,0.45); }
        [data-theme="light"] .post-tag { background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.5); }
        [data-theme="light"] .post-content { color: rgba(0,0,0,0.8); }
        [data-theme="light"] .post-content h1,
        [data-theme="light"] .post-content h2,
        [data-theme="light"] .post-content h3 { color: #24292f; }
        [data-theme="light"] .post-content strong { color: #24292f; }
        [data-theme="light"] .post-content code { background: rgba(0,0,0,0.06); color: #c0392b; }
        [data-theme="light"] .post-content blockquote { background: rgba(9,105,218,0.05); color: rgba(0,0,0,0.6); }
        [data-theme="light"] .post-content hr { border-top-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .post-content h2 { border-bottom-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .post-header { border-bottom-color: rgba(0,0,0,0.07); }
        [data-theme="light"] .post-footer { border-top-color: rgba(0,0,0,0.07); }
        [data-theme="light"] .comments-section { border-top-color: rgba(0,0,0,0.07); }
        [data-theme="light"] .post-nav { border-top-color: rgba(0,0,0,0.07); }
        [data-theme="light"] .post-nav-item { border-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .post-nav-label { color: rgba(0,0,0,0.35); }
        [data-theme="light"] .post-nav-title { color: rgba(0,0,0,0.7); }
        [data-theme="light"] .share-btn { border-color: rgba(0,0,0,0.15); color: rgba(0,0,0,0.6); }
        [data-theme="light"] .sidebar-card { background: #fff; border-color: rgba(0,0,0,0.1); }
        [data-theme="light"] .sidebar-title { color: rgba(0,0,0,0.45); }
        [data-theme="light"] .toc-list a { color: rgba(0,0,0,0.55); }
        [data-theme="light"] .related-post-title { color: rgba(0,0,0,0.75); }
        [data-theme="light"] .related-post-date { color: rgba(0,0,0,0.3); }
        [data-theme="light"] .related-post { border-bottom-color: rgba(0,0,0,0.06); }
        [data-theme="light"] .giscus-hint { background: rgba(9,105,218,0.05); border-color: rgba(9,105,218,0.2); color: #57606a; }
        [data-theme="light"] .code-copy-btn { background: rgba(0,0,0,0.07); border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.5); }
        [data-theme="light"] .back-top { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.12); color: rgba(0,0,0,0.5); }
        [data-theme="light"] .not-found h2 { color: rgba(0,0,0,0.6); }

<body>

<div id="progress-bar"></div>

<nav class="nav">
    <a href="index.html" class="nav-logo">Macle<em>.</em>dev</a>
    <div class="nav-links">
        <a href="index.html" data-zh="首页" data-en="Home">首页</a>
        <a href="blog.html" data-zh="博客" data-en="Blog">博客</a>
        <a href="tags.html" data-zh="标签" data-en="Tags">标签</a>

    <div class="lang-toggle">

</nav>
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

<div id="app"></div>

<!-- Floating Donate Button -->
<button class="fab-donate" onclick="openDonate()" title="打赏支持">&#9749;</button>
<div class="fab-donate-label">请作者喝杯咖啡</div>

<!-- WeChat Share Modal -->
<div class="wechat-modal-overlay" id="wechatModal" onclick="closeWechatOnOverlay(event)">
    <div class="wechat-modal">
        <h3>&#128241; 微信扫码分享</h3>
        <p>用微信扫描二维码打开此文章</p>
        <img id="wechatQrImg" alt="WeChat QR">
        <div class="wechat-url-box" id="wechatUrlBox" onclick="copyLink()">点击复制链接</div>
        <button class="wechat-modal-close" onclick="closeWechat()">关闭</button>

</div>

<!-- Donate Modal -->
<div class="modal-overlay" id="donateModal" onclick="closeDonateOnOverlay(event)">
    <div class="modal">
        <button class="modal-close" onclick="closeDonate()">&#10005;</button>
        <div class="modal-title">&#9749; 感谢你的支持</div>
        <div class="modal-subtitle">你的鼓励是我持续创作的动力</div>
        <div class="qr-row">
            <div class="qr-item">
                <div class="qr-img"><img src="images/wechat-pay.jpg" alt="微信收款码"></div>
                <div class="qr-label">微信支付</div>
                <div class="qr-sublabel">WeChat Pay</div>
            </div>
            <div class="qr-item">
                <div class="qr-img"><img src="images/alipay.jpg" alt="支付宝收款码"></div>
                <div class="qr-label">支付宝</div>
                <div class="qr-sublabel">Alipay</div>
            </div>
        </div>
    </div>

<script src="js/posts.js"></script>
<script>
    // ---- Language ----
    const LANG_KEY = 'macle_lang';
    let currentLang = localStorage.getItem(LANG_KEY) || 'zh';

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        document.querySelectorAll('[data-zh]').forEach(el => {
            const val = el.getAttribute('data-' + lang);
            if (val) el.textContent = val;
        });
        document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }

    // Apply saved lang to nav immediately
    (function() {
        if (currentLang === 'en') {
            document.getElementById('btn-zh').classList.remove('active');
            document.getElementById('btn-en').classList.add('active');
        }
    })();

    // ---- Donate Modal ----
    function openDonate() {
        document.getElementById('donateModal').classList.add('open');
    }
    function closeDonate() {
        document.getElementById('donateModal').classList.remove('open');
    }
    function closeDonateOnOverlay(e) {
        if (e.target === document.getElementById('donateModal')) closeDonate();
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDonate(); });

    // ---- Share ----
    function copyLink() {
        navigator.clipboard.writeText(location.href).then(() => {
            showToast('链接已复制');
        });
    }
    function shareToTelegram(title) {
        window.open('https://t.me/share/url?url=' + encodeURIComponent(location.href) + '&text=' + encodeURIComponent(title), '_blank');
    }
    function shareToWeibo(title) {
        window.open('https://service.weibo.com/share/share.php?url=' + encodeURIComponent(location.href) + '&title=' + encodeURIComponent(title + ' - Macle Chen'), '_blank');
    }
    function openWechatShare() {
        const url = location.href;
        // Use QR code API to generate QR for the current URL
        const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(url);
        document.getElementById('wechatQrImg').src = qrUrl;
        document.getElementById('wechatUrlBox').textContent = url;
        document.getElementById('wechatModal').classList.add('open');
    }
    function closeWechat() {
        document.getElementById('wechatModal').classList.remove('open');
    }
    function closeWechatOnOverlay(e) {
        if (e.target === document.getElementById('wechatModal')) closeWechat();
    }
    function handleSubscribe(e) {
        e.preventDefault();
        const email = e.target.querySelector('input').value;
        // Open Buttondown subscription with email prefilled
        window.open('https://buttondown.com/api/emails/embed-subscribe/maclechen?email=' + encodeURIComponent(email), '_blank');
        showToast('正在跳转到订阅确认页…');
        e.target.reset();
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.textContent = msg;
        Object.assign(t.style, {
            position: 'fixed', bottom: '80px', left: '50%', transform: 'translateX(-50%)',
            background: 'rgba(52,152,219,0.9)', color: '#fff',
            padding: '8px 20px', borderRadius: '20px',
            fontSize: '0.85rem', zIndex: '999', transition: 'opacity 0.3s'
        });
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
    }

    // ---- Table of Contents ----
    function buildToc(headings) {
        if (!headings.length) return '';
        return headings.map(h => `
            <li>
                <a href="#${h.id}" class="${h.level === 3 ? 'toc-h3' : ''}">
                    ${h.text}
                </a>
            </li>`).join('');
    }

    // ---- Date Format ----
    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.getFullYear() + ' 年 ' + (d.getMonth() + 1) + ' 月 ' + d.getDate() + ' 日';
    }

    // ---- Configure marked ----
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
        },
        breaks: true, gfm: true
    });

    // ---- Render Post (async: loads content from posts/{id}.md) ----
    async function renderPost() {
        const params = new URLSearchParams(location.search);
        const id = params.get('id');
        const post = POSTS.find(p => p.id === id);
        const app = document.getElementById('app');

        if (!post) {
            app.innerHTML = `<div class="not-found">
                <h2>文章未找到</h2>
                <p><a href="blog.html">返回博客列表</a></p>
            </div>`;
            return;
        }

        document.title = post.title + ' - Macle Chen';
        const metaDesc = document.getElementById('meta-desc');
        if (metaDesc) metaDesc.content = (post.summary || '').slice(0, 160) || 'Macle Chen 技术博客';
        const ogTitle = document.getElementById('og-title');
        if (ogTitle) ogTitle.content = post.title + ' - Macle Chen';
        const ogDesc = document.getElementById('og-desc');
        if (ogDesc) ogDesc.content = (post.summary || '').slice(0, 160);
        const ogUrl = document.getElementById('og-url');
        if (ogUrl) ogUrl.content = location.href;
        // Canonical URL
        const canonical = document.getElementById('canonical-url');
        if (canonical) canonical.href = location.href;
        // JSON-LD structured data
        const ldScript = document.createElement('script');
        ldScript.type = 'application/ld+json';
        ldScript.text = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "TechArticle",
            "headline": post.title,
            "description": (post.summary || '').slice(0, 200),
            "datePublished": post.date,
            "author": { "@type": "Person", "name": "Macle Chen", "url": "https://maclechen.github.io" },
            "publisher": { "@type": "Person", "name": "Macle Chen" },
            "url": location.href,
            "keywords": (post.tags || []).join(', '),
            "articleSection": post.category,
            "inLanguage": "zh-CN"
        });
        document.head.appendChild(ldScript);

        // Show loading skeleton first
        app.innerHTML = `<div class="page-layout">
            <main><article class="post-article">
                <div class="post-header">
                    <div class="post-meta-top">
                        <span class="post-category">${post.category}</span>
                        <span class="post-date">${formatDate(post.date)}</span>
                    </div>
                    <h1 class="post-title">${post.title}</h1>
                    <div class="post-tags">
                        ${post.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}
                    </div>
                </div>
                <div class="post-content" id="postContent" style="min-height:200px">
                    <p style="color:#8b949e;text-align:center;padding:40px 0">加载中…</p>
                </div>
            </article></main>
            <aside class="sidebar"></aside>
        </div>`;

        // Load markdown content: inline (legacy) or from posts/{id}.md
        let mdText = post.content || '';
        if (!mdText) {
            try {
                const resp = await fetch('./posts/' + post.id + '.md');
                if (resp.ok) {
                    mdText = await resp.text();
                } else {
                    mdText = post.csdn_url
                        ? `> 正文加载失败。[前往 CSDN 原文](${post.csdn_url})`
                        : '> 正文加载失败。';
                }
            } catch(e) {
                mdText = '> 网络错误，正文加载失败。';
            }
        }

        const contentHtml = marked.parse(mdText);

        // Extract headings for TOC
        const headings = [];
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = contentHtml;
        tempDiv.querySelectorAll('h2, h3').forEach((el, i) => {
            const hid = 'heading-' + i;
            el.id = hid;
            headings.push({ id: hid, text: el.textContent, level: parseInt(el.tagName[1]) });
        });

        // Prev / Next navigation
        const postIdx = POSTS.findIndex(p => p.id === post.id);
        const prevPost = postIdx > 0 ? POSTS[postIdx - 1] : null;
        const nextPost = postIdx < POSTS.length - 1 ? POSTS[postIdx + 1] : null;

        // Related posts
        const related = POSTS
            .filter(p => p.id !== post.id &&
                (p.category === post.category || p.tags.some(t => post.tags.includes(t))))
            .slice(0, 5);

        // Category gradient map for default covers
        const catGradients = {
            'iOS开发':   'linear-gradient(135deg,#1a1a4e,#0d3b8e,#1565c0)',
            'iOS\u5f00\u53d1': 'linear-gradient(135deg,#1a1a4e,#0d3b8e,#1565c0)',
            '逆向开发':  'linear-gradient(135deg,#3a0030,#7b1fa2,#c62828)',
            '\u9006\u5411\u5f00\u53d1': 'linear-gradient(135deg,#3a0030,#7b1fa2,#c62828)',
            '音视频':    'linear-gradient(135deg,#004d40,#00695c,#1b5e20)',
            'Android':  'linear-gradient(135deg,#1b3a1b,#2e7d32,#558b2f)',
            'Python':   'linear-gradient(135deg,#1a2a4a,#1565c0,#0277bd)',
        };
        const defaultGradient = 'linear-gradient(135deg,#161b22,#1c2333,#0d1117)';
        const coverHtml = post.cover
            ? `<img class="post-cover" src="${post.cover}" alt="${post.title}" onerror="this.style.display='none'">`
            : `<div class="post-cover-gradient" style="background:${catGradients[post.category] || defaultGradient}">
                <span style="position:relative;z-index:1">${post.category}</span>
               </div>`;

        const csdnLink = post.csdn_url
            ? `<a href="${post.csdn_url}" target="_blank" class="share-btn">原文 CSDN</a>`
            : '';

        app.innerHTML = `
        <div class="page-layout">
            <main>
                <article class="post-article">
                    ${coverHtml}
                    <div class="post-header">
                        <div class="post-meta-top">
                            <span class="post-category">${post.category}</span>
                            <span class="post-date">${formatDate(post.date)}</span>
                        </div>
                        <h1 class="post-title">${post.title}</h1>
                        <div class="post-tags">
                            ${post.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}
                        </div>
                    </div>
                    <div class="post-content" id="postContent">
                        ${tempDiv.innerHTML}
                    </div>
                    <div class="post-footer">
                        <div class="share-btns">
                            <button class="share-btn" onclick="copyLink()">&#128279; 复制链接</button>
                            <button class="share-btn" onclick="shareToWeibo('${post.title.replace(/'/g, "\\'")}')">&#127381; 微博</button>
                            <button class="share-btn" onclick="openWechatShare()">&#128241; 微信</button>
                            <button class="share-btn" onclick="shareToTelegram('${post.title.replace(/'/g, "\\'")}')">&#128240; Telegram</button>
                            ${csdnLink}
                        </div>
                        <button class="donate-btn-inline" onclick="openDonate()">&#9749; 打赏支持</button>
                    </div>
                    <div class="post-nav">
                        ${prevPost ? `<a class="post-nav-item post-nav-prev" href="post.html?id=${prevPost.id}">
                            <span class="post-nav-label">← 上一篇</span>
                            <span class="post-nav-title">${prevPost.title}</span>
                        </a>` : '<div></div>'}
                        ${nextPost ? `<a class="post-nav-item post-nav-next" href="post.html?id=${nextPost.id}">
                            <span class="post-nav-label">下一篇 →</span>
                            <span class="post-nav-title">${nextPost.title}</span>
                        </a>` : '<div></div>'}
                    </div>
                    <div class="comments-section">
                        <div class="comments-title">&#128172; 评论区</div>
                        <div class="giscus-hint">
                            <span class="giscus-hint-icon">&#128279;</span>
                            评论由 <strong>GitHub Discussions</strong> 提供 &mdash; 需要登录 GitHub 账号后才能发表评论或点赞
                            <a href="https://github.com/login" target="_blank" rel="noopener" class="giscus-login-btn">去登录 →</a>
                        </div>
                        <div id="giscus-container"></div>
                    </div>
                </article>
            </main>

            <aside class="sidebar">
                ${headings.length ? `
                <div class="sidebar-card">
                    <div class="sidebar-title">目录</div>
                    <ul class="toc-list">${buildToc(headings)}</ul>
                </div>` : ''}

                ${related.length ? `
                <div class="sidebar-card">
                    <div class="sidebar-title">相关文章</div>
                    ${related.map(r => `
                        <a class="related-post" href="post.html?id=${r.id}">
                            <span class="related-post-title">${r.title}</span>
                            <span class="related-post-date">${formatDate(r.date)}</span>
                        </a>`).join('')}
                </div>` : ''}

                <div class="sidebar-card">
                    <div class="sidebar-title">关于作者</div>
                    <p style="font-size:0.875rem;color:#8b949e;line-height:1.7;margin:0 0 12px">
                        iOS开发者，专注逆向工程、音视频处理。
                    </p>
                    <a href="index.html" style="color:#4a9eff;font-size:0.85rem;text-decoration:none">
                        查看完整介绍 →
                    </a>
                </div>

                <div class="subscribe-card">
                    <div class="subscribe-title">&#128231; 订阅更新</div>
                    <p class="subscribe-desc">新文章第一时间通知，不发垃圾邮件</p>
                    <form class="subscribe-form" onsubmit="handleSubscribe(event)">
                        <input class="subscribe-input" type="email" placeholder="your@email.com" required>
                        <button class="subscribe-btn" type="submit">免费订阅</button>
                    </form>
                </div>
            </aside>
        </div>`;

        // Load Giscus comments (must be done via createElement, not innerHTML)
        const giscusContainer = document.getElementById('giscus-container');
        if (giscusContainer) {
            const s = document.createElement('script');
            s.src = 'https://giscus.app/client.js';
            s.setAttribute('data-repo', 'MacleChen/MacleChen.github.io');
            s.setAttribute('data-repo-id', 'R_kgDOLVPSkA');
            s.setAttribute('data-category', 'General');
            s.setAttribute('data-category-id', 'DIC_kwDOLVPSkM4C3uNw');
            s.setAttribute('data-mapping', 'specific');
            s.setAttribute('data-term', 'post-' + post.id);
            s.setAttribute('data-strict', '0');
            s.setAttribute('data-reactions-enabled', '1');
            s.setAttribute('data-emit-metadata', '0');
            s.setAttribute('data-input-position', 'top');
            s.setAttribute('data-theme', 'dark_protanopia');
            s.setAttribute('data-lang', 'zh-CN');
            s.setAttribute('crossorigin', 'anonymous');
            s.async = true;
            giscusContainer.appendChild(s);
        }

        // Wrap tables for horizontal scroll
        document.querySelectorAll('#postContent table').forEach(t => {
            const wrap = document.createElement('div');
            wrap.className = 'table-wrap';
            t.parentNode.insertBefore(wrap, t);
            wrap.appendChild(t);
        });

        // Code copy buttons
        document.querySelectorAll('#postContent pre').forEach(pre => {
            const wrap = document.createElement('div');
            wrap.className = 'pre-wrap';
            pre.parentNode.insertBefore(wrap, pre);
            wrap.appendChild(pre);
            const btn = document.createElement('button');
            btn.className = 'code-copy-btn';
            btn.textContent = '复制';
            btn.onclick = () => {
                const code = pre.querySelector('code');
                navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(() => {
                    btn.textContent = '已复制!';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
                });
            };
            wrap.appendChild(btn);
        });

        // Smooth scroll for TOC
        document.querySelectorAll('.toc-list a').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                const el = document.getElementById(a.getAttribute('href').slice(1));
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });
    }

    renderPost();

    // ---- Theme Toggle ----
    const THEME_KEY = 'macle_theme';
    function initTheme() {
        const saved = localStorage.getItem(THEME_KEY) || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('themeBtn').textContent = saved === 'dark' ? '🌙' : '☀️';
    }
    function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem(THEME_KEY, next);
        document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
    }
    initTheme();

    // ---- Reading Progress Bar ----
    window.addEventListener('scroll', () => {
        const bar = document.getElementById('progress-bar');
        const body = document.body;
        const html = document.documentElement;
        const scrollTop = window.scrollY;
        const total = Math.max(body.scrollHeight, html.scrollHeight) - window.innerHeight;
        bar.style.width = total > 0 ? (scrollTop / total * 100) + '%' : '0%';

        // Back-to-top visibility
        const backTop = document.getElementById('backTop');
        if (backTop) backTop.classList.toggle('visible', scrollTop > 400);
    });
</script>
</body>
</html>
