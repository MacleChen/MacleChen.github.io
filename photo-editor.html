<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>发布照片 — Macle Chen</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- exifr: 轻量级 EXIF 读取库 -->
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
    <script src="js/photos.js"></script>
    <style>
        :root {
            --bg:      #0d1117;
            --card:    #161b22;
            --border:  rgba(255,255,255,0.08);
            --text:    #e6edf3;
            --muted:   #8b949e;
            --accent:  #4a9eff;
            --success: #3fb950;
            --error:   #f85149;
            --warn:    #d29922;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
            font-size: 14px; min-height: 100vh;
        }
        a { color: inherit; text-decoration: none; }

        /* ── NAV ── */
        .nav {
            position: sticky; top: 0; z-index: 100;
            height: 52px; display: flex; align-items: center;
            padding: 0 20px; gap: 10px;
            background: rgba(13,17,23,0.97);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-weight: 700; font-size: 0.95rem; color: var(--text); margin-right: auto; }
        .nav-logo em { color: var(--accent); font-style: normal; }
        .btn {
            padding: 6px 16px; border-radius: 7px; border: none;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s; white-space: nowrap;
            text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover:not(:disabled) { filter: brightness(1.12); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        /* ── LAYOUT ── */
        .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
        .two-col { display: grid; grid-template-columns: 1fr 340px; gap: 20px; align-items: start; }

        /* ── TOKEN BAR ── */
        .token-bar {
            display: flex; align-items: center; gap: 8px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 9px; padding: 10px 14px; margin-bottom: 20px;
        }
        .token-bar span { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
        .token-bar input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            border-radius: 5px; color: var(--text); font-size: 0.78rem;
            padding: 5px 8px; outline: none; font-family: monospace; min-width: 0;
        }
        .token-bar input:focus { border-color: var(--accent); }
        .tok-ok  { font-size: 0.75rem; color: var(--success); white-space: nowrap; }
        .tok-err { font-size: 0.75rem; color: var(--error); white-space: nowrap; }
        .tok-link { font-size: 0.75rem; color: var(--accent); white-space: nowrap; }
        .tok-link:hover { text-decoration: underline; }

        /* ── DROP ZONE ── */
        .drop-zone {
            border: 2px dashed var(--border); border-radius: 12px;
            min-height: 260px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
            position: relative; overflow: hidden;
            background: var(--card);
        }
        .drop-zone.drag-over { border-color: var(--accent); background: rgba(74,158,255,0.06); }
        .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .drop-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: 0.5; }
        .drop-text { font-size: 0.88rem; color: var(--muted); }
        .drop-sub  { font-size: 0.75rem; color: rgba(255,255,255,0.2); margin-top: 4px; }

        /* ── PREVIEW ── */
        .preview-img {
            width: 100%; border-radius: 10px; display: block;
            max-height: 400px; object-fit: cover; margin-bottom: 10px;
        }
        .preview-change {
            font-size: 0.75rem; color: var(--muted); text-align: center;
            cursor: pointer; padding: 6px;
        }
        .preview-change:hover { color: var(--accent); }

        /* ── FORM ── */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin: 0 0 16px; }
        .field { margin-bottom: 14px; }
        .field:last-child { margin-bottom: 0; }
        .field label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
        .field input, .field textarea {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 7px; color: var(--text); font-size: 0.88rem;
            padding: 8px 11px; outline: none; font-family: inherit;
            transition: border-color 0.15s; resize: vertical;
        }
        .field input:focus, .field textarea:focus { border-color: var(--accent); }
        .field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.18); }
        .field-hint { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* ── EXIF BADGE ── */
        .exif-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .exif-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 10px;
        }
        .exif-key { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
        .exif-val { font-size: 0.82rem; color: var(--text); font-family: monospace; }
        .exif-empty { font-size: 0.78rem; color: var(--muted); padding: 12px 0; text-align: center; }
        .exif-loading { font-size: 0.78rem; color: var(--accent); padding: 12px 0; text-align: center; }

        /* ── STATUS ── */
        .status-bar {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 16px; margin-top: 16px;
            font-size: 0.82rem; display: none;
        }
        .status-bar.show { display: block; }
        .status-step { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
        .step-ico { font-size: 0.85rem; width: 18px; text-align: center; flex-shrink: 0; }
        .step-ok  { color: var(--success); }
        .step-err { color: var(--error); }
        .step-spin { animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 20px; font-size: 0.85rem;
            display: none; align-items: center; gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 999; white-space: nowrap;
        }
        .toast.show { display: flex; }
        .toast.ok  { border-color: var(--success); color: var(--success); }
        .toast.err { border-color: var(--error);   color: var(--error); }
        .toast.info{ border-color: var(--accent);  color: var(--accent); }

        @media (max-width: 680px) {
            .two-col { grid-template-columns: 1fr; }
            .field-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="photos.html" class="nav-logo">Macle<em>.</em>dev · 发布照片</a>
    <a href="photos.html" class="btn btn-ghost">← 图库</a>
</nav>

<div class="wrap">

    <!-- GitHub Token -->
    <div class="token-bar">
        <span>GitHub Token</span>
        <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxx…" oninput="saveToken()">
        <span id="tokenStatus" class="tok-err">未设置</span>
        <a class="tok-link"
           href="https://github.com/settings/tokens/new?scopes=repo&description=Macle+Photo+Editor"
           target="_blank">获取 →</a>
    </div>

    <div class="two-col">

        <!-- LEFT: 上传区 + 表单 -->
        <div>
            <!-- Drop Zone -->
            <div id="dropZone" class="drop-zone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
                <input type="file" id="fileInput" accept="image/*" onchange="onFileChange(event)">
                <div id="dropDefault">
                    <div class="drop-icon">📷</div>
                    <div class="drop-text">点击或拖拽照片到这里</div>
                    <div class="drop-sub">支持 JPG / HEIC / PNG，自动提取 EXIF 参数</div>
                </div>
                <img id="previewImg" class="preview-img" style="display:none" alt="预览">
            </div>
            <div id="changeHint" class="preview-change" style="display:none" onclick="document.getElementById('fileInput').click()">点击更换照片</div>

            <!-- 描述 & 基本信息 -->
            <div class="card" style="margin-top:16px">
                <div class="card-title">照片信息</div>
                <div class="field">
                    <label>一句话描述 *</label>
                    <input id="fDesc" type="text" placeholder="用一句话描述这张照片…" maxlength="120">
                </div>
                <div class="field-row">
                    <div class="field">
                        <label>拍摄日期</label>
                        <input id="fDate" type="date">
                    </div>
                    <div class="field">
                        <label>拍摄地点</label>
                        <input id="fLocation" type="text" placeholder="城市或地点">
                    </div>
                </div>
                <div class="field">
                    <label>标签</label>
                    <input id="fTags" type="text" placeholder="城市, 黄昏, 人文（逗号分隔）">
                </div>
            </div>

            <!-- Publish button + status -->
            <button id="publishBtn" class="btn btn-primary" style="width:100%;margin-top:14px;justify-content:center;height:42px" onclick="publish()" disabled>
                发布照片
            </button>
            <div class="status-bar" id="statusBar"></div>
        </div>

        <!-- RIGHT: EXIF 参数 -->
        <div>
            <div class="card">
                <div class="card-title">相机参数（自动识别）</div>
                <div id="exifPanel"><div class="exif-empty">上传照片后自动读取</div></div>

                <!-- 手动覆盖 -->
                <div style="margin-top:16px; border-top:1px solid var(--border); padding-top:14px;">
                    <div class="card-title" style="margin-bottom:10px">手动修正</div>
                    <div class="field">
                        <label>相机 / 设备</label>
                        <input id="fCamera" type="text" placeholder="iPhone 15 Pro">
                    </div>
                    <div class="field">
                        <label>镜头</label>
                        <input id="fLens" type="text" placeholder="24mm f/1.78">
                    </div>
                    <div class="field-row">
                        <div class="field"><label>光圈</label><input id="fAperture" type="text" placeholder="f/1.8"></div>
                        <div class="field"><label>快门</label><input id="fShutter" type="text" placeholder="1/100s"></div>
                    </div>
                    <div class="field-row">
                        <div class="field"><label>ISO</label><input id="fIso" type="number" placeholder="100" min="1"></div>
                        <div class="field"><label>焦距</label><input id="fFocal" type="text" placeholder="24mm"></div>
                    </div>
                </div>
            </div>

            <!-- 生成代码片段 (备用) -->
            <div class="card" style="margin-top:14px">
                <div class="card-title" style="margin-bottom:8px">或手动添加到 photos.js</div>
                <textarea id="codeSnippet" rows="6" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:0.72rem;font-family:monospace;padding:8px;outline:none;resize:vertical" readonly placeholder="选择照片后自动生成…"></textarea>
                <button class="btn btn-ghost" style="margin-top:8px;width:100%;justify-content:center" onclick="copySnippet()">复制代码</button>
            </div>
        </div>

    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REPO      = 'MacleChen/MacleChen.github.io';
const TOKEN_KEY = 'macle_token';

let selectedFile = null;
let parsedExif   = {};

// ── Token ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    const tok = localStorage.getItem(TOKEN_KEY) || '';
    document.getElementById('tokenInput').value = tok;
    updateTokenStatus(tok);
    document.getElementById('fDate').value = new Date().toISOString().slice(0, 10);
});

function saveToken() {
    const t = document.getElementById('tokenInput').value.trim();
    localStorage.setItem(TOKEN_KEY, t);
    updateTokenStatus(t);
}
function updateTokenStatus(t) {
    const el = document.getElementById('tokenStatus');
    const ok = t && (t.startsWith('ghp_') || t.startsWith('github_pat_'));
    el.textContent = t ? (ok ? '✓ 已设置' : '⚠ 格式有误') : '未设置';
    el.className   = ok ? 'tok-ok' : 'tok-err';
}

// ── Drop / File ───────────────────────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDragLeave(e) { document.getElementById('dropZone').classList.remove('drag-over'); }
function onDrop(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadFile(file);
}
function onFileChange(e) {
    const file = e.target.files[0];
    if (file) loadFile(file);
}

async function loadFile(file) {
    selectedFile = file;

    // Show preview
    const url = URL.createObjectURL(file);
    const img  = document.getElementById('previewImg');
    img.src = url;
    img.style.display = 'block';
    document.getElementById('dropDefault').style.display = 'none';
    document.getElementById('changeHint').style.display  = 'block';

    // Update snippet & enable publish
    updateSnippet();
    document.getElementById('publishBtn').disabled = false;

    // Parse EXIF
    document.getElementById('exifPanel').innerHTML = '<div class="exif-loading">⏳ 正在读取 EXIF…</div>';
    try {
        const exif = await Exifr.parse(file, {
            tiff: true, exif: true, gps: true,
            pick: ['Make','Model','LensModel','ExposureTime','FNumber','ISO','ISOSpeedRatings','FocalLength','FocalLengthIn35mmFormat','DateTimeOriginal','latitude','longitude'],
        });
        parsedExif = exif || {};
        applyExif(parsedExif, file);
    } catch(e) {
        parsedExif = {};
        document.getElementById('exifPanel').innerHTML = '<div class="exif-empty">未能读取 EXIF（可能是截图或处理过的图片）</div>';
    }
    updateSnippet();
}

function applyExif(exif, file) {
    // Camera model
    const camera = [exif.Make, exif.Model].filter(Boolean).join(' ').trim();
    if (camera) document.getElementById('fCamera').value = camera;

    // Lens
    if (exif.LensModel) document.getElementById('fLens').value = exif.LensModel;

    // Aperture
    if (exif.FNumber) document.getElementById('fAperture').value = 'f/' + exif.FNumber.toFixed(1).replace(/\.0$/,'');

    // Shutter
    if (exif.ExposureTime) document.getElementById('fShutter').value = fmtShutter(exif.ExposureTime);

    // ISO
    const iso = exif.ISO || exif.ISOSpeedRatings;
    if (iso) document.getElementById('fIso').value = iso;

    // Focal length (prefer 35mm equiv)
    const fl = exif.FocalLengthIn35mmFormat || exif.FocalLength;
    if (fl) document.getElementById('fFocal').value = Math.round(fl) + 'mm';

    // Date from EXIF
    if (exif.DateTimeOriginal) {
        const d = exif.DateTimeOriginal;
        if (d instanceof Date && !isNaN(d)) {
            document.getElementById('fDate').value = d.toISOString().slice(0, 10);
        }
    }

    // Render EXIF badge
    const items = [
        camera ? { key:'相机', val: camera } : null,
        exif.LensModel ? { key:'镜头', val: exif.LensModel } : null,
        exif.FNumber   ? { key:'光圈', val: 'f/' + exif.FNumber.toFixed(1).replace(/\.0$/,'') } : null,
        exif.ExposureTime ? { key:'快门', val: fmtShutter(exif.ExposureTime) } : null,
        iso ? { key:'ISO', val: iso } : null,
        fl  ? { key:'焦距', val: Math.round(fl)+'mm' } : null,
        (exif.latitude && exif.longitude) ? { key:'GPS', val: `${exif.latitude.toFixed(4)}, ${exif.longitude.toFixed(4)}` } : null,
    ].filter(Boolean);

    document.getElementById('exifPanel').innerHTML = items.length
        ? `<div class="exif-grid">${items.map(i=>`<div class="exif-item"><div class="exif-key">${i.key}</div><div class="exif-val">${escHtml(String(i.val))}</div></div>`).join('')}</div>`
        : '<div class="exif-empty">图片中没有 EXIF 信息</div>';
}

function fmtShutter(t) {
    if (t >= 1)  return t + 's';
    const d = Math.round(1 / t);
    return `1/${d}s`;
}

// ── Snippet ───────────────────────────────────────────────────────────────────
function buildEntry(id) {
    const v = val => JSON.stringify(v => v || '');
    const desc     = document.getElementById('fDesc').value.trim();
    const date     = document.getElementById('fDate').value;
    const location = document.getElementById('fLocation').value.trim();
    const tagsRaw  = document.getElementById('fTags').value.trim();
    const camera   = document.getElementById('fCamera').value.trim();
    const lens     = document.getElementById('fLens').value.trim();
    const aperture = document.getElementById('fAperture').value.trim();
    const shutter  = document.getElementById('fShutter').value.trim();
    const iso      = parseInt(document.getElementById('fIso').value) || 0;
    const focal    = document.getElementById('fFocal').value.trim();
    const tags     = tagsRaw ? tagsRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
    const eid      = id || String(Date.now());

    return {
        id: eid,
        date: date || new Date().toISOString().slice(0,10),
        description: desc,
        src: `images/photos/${eid}.jpg`,
        camera, lens, aperture, shutter,
        iso: iso || undefined,
        focalLength: focal,
        location,
        tags,
    };
}

function updateSnippet() {
    const entry  = buildEntry();
    const snippet = `  {\n    id: "${entry.id}",\n    date: "${entry.date}",\n    description: "${entry.description}",\n    src: "${entry.src}",\n    camera: "${entry.camera}",\n    lens: "${entry.lens}",\n    aperture: "${entry.aperture}",\n    shutter: "${entry.shutter}",\n    iso: ${entry.iso || 0},\n    focalLength: "${entry.focalLength}",\n    location: "${entry.location}",\n    tags: ${JSON.stringify(entry.tags)},\n  },`;
    document.getElementById('codeSnippet').value = snippet;
}

// Update snippet on any field change
document.addEventListener('DOMContentLoaded', () => {
    ['fDesc','fDate','fLocation','fTags','fCamera','fLens','fAperture','fShutter','fIso','fFocal']
        .forEach(id => document.getElementById(id).addEventListener('input', updateSnippet));
});

function copySnippet() {
    const el = document.getElementById('codeSnippet');
    if (!el.value) { showToast('先上传一张照片', 'err'); return; }
    navigator.clipboard.writeText(el.value).then(() => showToast('已复制到剪贴板', 'ok'));
}

// ── Publish ───────────────────────────────────────────────────────────────────
async function publish() {
    const token = (localStorage.getItem(TOKEN_KEY) || '').trim();
    if (!token) { showToast('请先设置 GitHub Token', 'err'); return; }
    if (!selectedFile) { showToast('请先选择照片', 'err'); return; }
    const desc = document.getElementById('fDesc').value.trim();
    if (!desc) { showToast('请填写一句话描述', 'err'); return; }

    const btn  = document.getElementById('publishBtn');
    btn.disabled = true;
    btn.textContent = '发布中…';

    const id    = String(Date.now());
    const entry = buildEntry(id);
    const steps = document.getElementById('statusBar');
    steps.innerHTML = '';
    steps.classList.add('show');

    try {
        // Step 1: Upload image
        addStep(steps, 'spin', '正在上传图片…');
        const base64 = await fileToBase64(selectedFile);
        const imgPath = `images/photos/${id}.jpg`;
        await ghPut(token, imgPath, base64, `添加照片: ${desc}`);
        updateLastStep(steps, 'ok', `图片已上传 → ${imgPath}`);

        // Step 2: Update photos.js
        addStep(steps, 'spin', '正在更新 photos.js…');
        const currentFile = await ghGet(token, 'js/photos.js');
        const currentContent = atob(currentFile.content.replace(/\n/g,''));
        const newEntry = `\n  {\n    id: "${entry.id}",\n    date: "${entry.date}",\n    description: ${JSON.stringify(entry.description)},\n    src: ${JSON.stringify(entry.src)},\n    camera: ${JSON.stringify(entry.camera)},\n    lens: ${JSON.stringify(entry.lens)},\n    aperture: ${JSON.stringify(entry.aperture)},\n    shutter: ${JSON.stringify(entry.shutter)},\n    iso: ${entry.iso || 0},\n    focalLength: ${JSON.stringify(entry.focalLength)},\n    location: ${JSON.stringify(entry.location)},\n    tags: ${JSON.stringify(entry.tags)},\n  },`;
        const updated = currentContent.replace(/const PHOTOS\s*=\s*\[/, `const PHOTOS = [${newEntry}`);
        const updatedB64 = btoa(unescape(encodeURIComponent(updated)));
        await ghPut(token, 'js/photos.js', updatedB64, `发布照片: ${desc}`, currentFile.sha);
        updateLastStep(steps, 'ok', 'photos.js 已更新');

        addStep(steps, 'ok', '🎉 发布成功！稍候刷新图库即可看到');
        showToast('发布成功', 'ok');
        btn.textContent = '再发一张';
        btn.disabled = false;
        btn.onclick = () => location.reload();

    } catch(e) {
        updateLastStep(steps, 'err', '错误：' + e.message);
        showToast(e.message, 'err');
        btn.disabled = false;
        btn.textContent = '重试';
    }
}

// ── GitHub API ────────────────────────────────────────────────────────────────
async function ghGet(token, path) {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' },
    });
    if (!r.ok) throw new Error(`获取 ${path} 失败 (${r.status})`);
    return r.json();
}

async function ghPut(token, path, content, message, sha) {
    const body = { message, content };
    if (sha) body.sha = sha;
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
        body: JSON.stringify(body),
    });
    if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.message || `写入 ${path} 失败 (${r.status})`);
    }
    return r.json();
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result.split(',')[1]);
        reader.onerror = () => reject(new Error('文件读取失败'));
        reader.readAsDataURL(file);
    });
}

// ── Steps UI ─────────────────────────────────────────────────────────────────
function addStep(container, type, text) {
    const el = document.createElement('div');
    el.className = 'status-step';
    el.innerHTML = stepIcon(type) + `<span>${escHtml(text)}</span>`;
    container.appendChild(el);
    el.scrollIntoView({ block: 'nearest' });
}
function updateLastStep(container, type, text) {
    const el = container.lastElementChild;
    if (!el) return;
    el.innerHTML = stepIcon(type) + `<span>${escHtml(text)}</span>`;
}
function stepIcon(type) {
    const map = { ok: '✓', err: '✕', spin: '↻' };
    const cls = { ok: 'step-ok', err: 'step-err', spin: 'step-spin' };
    return `<span class="step-ico ${cls[type]||''}">${map[type]||'·'}</span>`;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'info') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
